<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM MARKET | ADMIN PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .admin-card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 24px; }
        input, textarea, select { 
            background: #1a1a1a !important; border: 1px solid #333 !important; 
            color: #fff !important; padding: 12px; border-radius: 12px; width: 100%; outline: none;
        }
        input:focus { border-color: #bf953f !important; }
        .btn-gold { 
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728); 
            color: #000; font-weight: 800; padding: 14px; border-radius: 12px; transition: opacity 0.2s;
        }
        .btn-gold:active { opacity: 0.8; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-2xl mx-auto space-y-8">
        <h1 class="text-3xl font-black text-[#bf953f] italic">ПАНЕЛЬ УПРАВЛЕНИЯ</h1>

        <!-- БЛОК 1: УПРАВЛЕНИЕ РЕКЛАМОЙ -->
        <div class="admin-card">
            <h2 class="text-xl font-bold mb-4 text-white">Рекламный баннер (Фото + Текст)</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-gray-500 font-bold ml-2">Ссылка на картинку или GIF</label>
                    <input type="text" id="ad-image" placeholder="https://site.com/image.jpg">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-gray-500 font-bold ml-2">Заголовок акции</label>
                    <input type="text" id="ad-title" placeholder="Например: Скидка 50% на золото">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-gray-500 font-bold ml-2">Текст объявления</label>
                    <textarea id="ad-text" rows="2" placeholder="Подробности акции..."></textarea>
                </div>
                <button onclick="updateAd()" class="btn-gold w-full">ОПУБЛИКОВАТЬ РЕКЛАМУ</button>
            </div>
        </div>

        <!-- БЛОК 2: ДОБАВЛЕНИЕ НОМЕРА -->
        <div class="admin-card">
            <h2 class="text-xl font-bold mb-4 text-white">Добавить SIM-карту</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="num" placeholder="900-000-00-00">
                <input type="number" id="price" placeholder="Цена (руб)">
                <select id="op">
                    <option value="МЕГАФОН">МЕГАФОН</option>
                    <option value="БИЛАЙН">БИЛАЙН</option>
                    <option value="МТС">МТС</option>
                    <option value="ТЕЛЕ2">ТЕЛЕ2</option>
                </select>
                <button onclick="addSim()" class="btn-gold">ДОБАВИТЬ НОМЕР</button>
            </div>
        </div>

        <!-- Список заявок можно добавить сюда ниже -->
    </div>

    <script>
        // Твои настройки Firebase
        const conf = { 
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(conf);
        const db = firebase.database();

        // ФУНКЦИЯ ОБНОВЛЕНИЯ РЕКЛАМЫ
        function updateAd() {
            const img = document.getElementById('ad-image').value;
            const title = document.getElementById('ad-title').value;
            const text = document.getElementById('ad-text').value;

            if(!title || !text) return alert("Заполни хотя бы заголовок и текст!");

            // Мы используем .set() для пути 'blog/main', чтобы всегда перезаписывать одну и ту же рекламу
            db.ref('blog').set({
                promo: {
                    image: img,
                    title: title,
                    text: text,
                    timestamp: Date.now()
                }
            }).then(() => {
                alert("Реклама успешно обновлена на сайте!");
            }).catch(err => alert("Ошибка: " + err));
        }

        // ФУНКЦИЯ ДОБАВЛЕНИЯ НОМЕРА
        function addSim() {
            const n = document.getElementById('num').value;
            const p = document.getElementById('price').value;
            const o = document.getElementById('op').value;
            if(!n || !p) return alert("Заполни данные номера!");

            db.ref('inventory').push({ num: n, price: p, op: o })
            .then(() => {
                alert("Номер добавлен!");
                document.getElementById('num').value = "";
                document.getElementById('price').value = "";
            });
        }
    </script>
</body>
</html>
