<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-MARKET | PRO ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Manrope', sans-serif; margin: 0; padding-bottom: 60px; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 24px; padding: 20px; }
        input, select, textarea { 
            background: #111!important; border: 1px solid #222!important; 
            color: #fff!important; padding: 14px; border-radius: 16px; width: 100%; outline: none; font-size: 14px;
        }
        .nav-btn { padding: 12px; border-radius: 14px; font-weight: 800; font-size: 10px; text-transform: uppercase; opacity: 0.4; flex: 1; text-align: center; border: 1px solid transparent; }
        .nav-btn.active { opacity: 1; background: rgba(191,149,63,0.1); border-color: #bf953f; color: #bf953f; }
        .btn-gold { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728); color: #000; font-weight: 900; padding: 16px; border-radius: 18px; width: 100%; text-transform: uppercase; font-size: 12px; }
        .btn-gold:disabled { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-xl mx-auto">
        <h1 class="text-2xl italic gold-text my-6 text-center">SIM-ADMIN PANEL</h1>

        <!-- МЕНЮ -->
        <nav class="flex gap-2 mb-8 bg-[#0d0d0d] p-1.5 rounded-2xl border border-white/5 overflow-x-auto no-scrollbar">
            <button onclick="showTab('promo')" id="tab-promo-btn" class="nav-btn active">Реклама</button>
            <button onclick="showTab('sim')" id="tab-sim-btn" class="nav-btn">Номера</button>
            <button onclick="showTab('orders')" id="tab-orders-btn" class="nav-btn">Заказы</button>
            <button onclick="showTab('users')" id="tab-users-btn" class="nav-btn">Клиенты</button>
        </nav>

        <!-- 1. РЕКЛАМА -->
        <div id="section-promo" class="tab-content space-y-4">
            <div class="card border-dashed border-[#bf953f]/30 text-center">
                <input type="file" id="ad-file" class="hidden" accept="image/*" onchange="previewFile()">
                <label for="ad-file" id="file-label" class="flex flex-col items-center justify-center p-12 bg-black border-2 border-dashed border-white/5 rounded-3xl cursor-pointer text-[#bf953f] font-black uppercase text-[11px]">
                    ВЫБРАТЬ ФОТО ДЛЯ РЕКЛАМЫ
                </label>
                <div class="space-y-4 mt-4">
                    <input type="text" id="ad-title" placeholder="Заголовок (например: АКЦИЯ!)">
                    <textarea id="ad-text" rows="2" placeholder="Текст акции..."></textarea>
                    <button id="pub-btn" onclick="publishAd()" class="btn-gold">ОПУБЛИКОВАТЬ</button>
                </div>
            </div>
        </div>

        <!-- 2. НОМЕРА -->
        <div id="section-sim" class="tab-content hidden space-y-4">
            <div class="card">
                <h2 class="text-[10px] font-black uppercase text-gray-500 mb-4">Добавить номер</h2>
                <input type="text" id="sim-num" placeholder="900 000-00-00" class="mb-3">
                <input type="number" id="sim-price" placeholder="Цена" class="mb-3">
                <select id="sim-op" class="mb-3">
                    <option value="МЕГАФОН">МЕГАФОН</option>
                    <option value="БИЛАЙН">БИЛАЙН</option>
                    <option value="МТС">МТС</option>
                    <option value="ТЕЛЕ2">ТЕЛЕ2</option>
                </select>
                <button onclick="addSim()" class="btn-gold">ДОБАВИТЬ В КАТАЛОГ</button>
            </div>
        </div>

        <!-- 3. ЗАКАЗЫ -->
        <div id="section-orders" class="tab-content hidden space-y-3">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-[10px] font-bold text-gray-500 uppercase">Новые заказы</h2>
                <button onclick="db.ref('orders').remove()" class="text-[9px] text-red-500 font-bold">ОЧИСТИТЬ</button>
            </div>
            <div id="orders-container" class="space-y-3"></div>
        </div>

        <!-- 4. КЛИЕНТЫ -->
        <div id="section-users" class="tab-content hidden space-y-2">
            <h2 class="text-[10px] font-bold text-gray-500 uppercase px-2 mb-2">Банк участников</h2>
            <div id="users-container" class="space-y-2"></div>
        </div>

    </div>

    <script>
        // FIREBASE CONFIG
        const conf = { 
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(conf);
        const db = firebase.database();

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab + '-btn').classList.add('active');
            if(tab === 'orders') loadOrders();
            if(tab === 'users') loadUsers();
        }

        function previewFile() {
            const f = document.getElementById('ad-file').files[0];
            if(f) document.getElementById('file-label').innerText = "ФОТО ВЫБРАНО: " + f.name;
        }

        // --- РЕКЛАМА (ТВОЙ КЛЮЧ И ПРОВЕРКА) ---
        async function publishAd() {
            const fileInput = document.getElementById('ad-file');
            const title = document.getElementById('ad-title').value;
            const text = document.getElementById('ad-text').value;
            const btn = document.getElementById('pub-btn');
            
            if(!fileInput.files[0] || !title) return alert("Выбери фото и впиши заголовок!");

            btn.disabled = true; 
            btn.innerText = "ЗАГРУЗКА...";
            
            const formData = new FormData();
            formData.append("image", fileInput.files[0]);

            try {
                // ТВОЙ КЛЮЧ ImgBB (Исправлен)
                const apiKey = "08dbbd52689aaf4866d654df10d0ed1"; 
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                    method: "POST", body: formData
                });
                
                const result = await res.json();
                
                if (result.success) {
                    await db.ref('blog/promo').set({
                        image: result.data.url, title: title, text: text, date: Date.now()
                    });
                    alert("Готово! Реклама обновлена.");
                    location.reload();
                } else {
                    alert("Ошибка ключа: " + result.error.message);
                }
            } catch(e) { alert("Ошибка: " + e.message); }
            finally { btn.disabled = false; btn.innerText = "ОПУБЛИКОВАТЬ"; }
        }

        function addSim() {
            const num = document.getElementById('sim-num').value;
            const price = document.getElementById('sim-price').value;
            const op = document.getElementById('sim-op').value;
            if(!num || !price) return;
            db.ref('inventory').push({ num, price, op }).then(() => {
                alert("Номер добавлен!");
                document.getElementById('sim-num').value = "";
            });
        }

        function loadOrders() {
            db.ref('orders').on('value', snap => {
                const container = document.getElementById('orders-container');
                container.innerHTML = "";
                snap.forEach(c => {
                    const o = c.val();
                    container.innerHTML += `
                        <div class="card border-l-2 border-[#bf953f]">
                            <div class="flex justify-between">
                                <p class="text-lg font-black">+7 ${o.wantedNum}</p>
                                <button onclick="db.ref('orders/${c.key}').remove()" class="text-xs opacity-50">✕</button>
                            </div>
                            <p class="text-xs mt-2 opacity-70">${o.clientName} | +7 ${o.clientPhone}</p>
                        </div>`;
                });
            });
        }

        function loadUsers() {
            db.ref('users').on('value', snap => {
                const container = document.getElementById('users-container');
                container.innerHTML = "";
                snap.forEach(c => {
                    const u = c.val();
                    container.innerHTML += `
                        <div class="flex justify-between p-4 bg-[#0d0d0d] rounded-2xl border border-white/5">
                            <div><p class="text-xs font-bold">${u.name || 'КЛИЕНТ'}</p><p class="text-[10px] opacity-40">+7 ${c.key}</p></div>
                            <p class="text-[10px] text-[#bf953f] font-bold">PASS: ${u.pass}</p>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
