<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM ADMIN | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background: #050505; color: #fff; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 15px; }
        .tab-btn { padding: 10px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: 1px solid #222; text-align: center; color: #555; }
        .tab-btn.active { background: #bf953f; color: #000; border-color: #bf953f; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 12px; width: 100%; outline: none; font-size: 14px; }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black text-[#bf953f]">SIM ADMIN</h1>
        <div id="stat" class="text-[10px] font-bold opacity-50">Загрузка...</div>
    </header>

    <div class="grid grid-cols-4 gap-2 mb-6">
        <div class="tab-btn active" id="t1" onclick="showSec('orders', 't1')">Заказы</div>
        <div class="tab-btn" id="t2" onclick="showSec('inv', 't2')">Номера</div>
        <div class="tab-btn" id="t3" onclick="showSec('users', 't3')">Клиенты</div>
        <div class="tab-btn" id="t4" onclick="showSec('add', 't4')">+</div>
    </div>

    <div id="sec-orders" class="space-y-3"></div>

    <div id="sec-inv" class="hidden space-y-3">
        <h2 class="text-[10px] font-black opacity-30 uppercase mb-4">Управление номерами</h2>
        <div id="inv-list" class="space-y-3"></div>
    </div>

    <div id="sec-users" class="hidden space-y-3">
        <div id="users-list" class="space-y-3"></div>
    </div>

    <div id="sec-add" class="hidden card space-y-4">
        <input type="text" id="n-num" placeholder="Номер (928...)">
        <input type="number" id="n-price" placeholder="Цена">
        <select id="n-op">
            <option value="МТС">МТС</option>
            <option value="БИЛАЙН">БИЛАЙН</option>
            <option value="МЕГАФОН">МЕГАФОН</option>
            <option value="ТЕЛЕ2">ТЕЛЕ2</option>
        </select>
        <button onclick="addNumber()" class="w-full py-4 bg-[#bf953f] text-black font-black rounded-xl uppercase text-xs">Добавить на сайт</button>
    </div>

    <script>
        const fbCfg = { 
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
            authDomain: "nnnmb-a0b52.firebaseapp.com", 
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com", 
            projectId: "nnnmb-a0b52" 
        };
        firebase.initializeApp(fbCfg);
        const db = firebase.database();

        function showSec(id, tId) {
            document.querySelectorAll('[id^="sec-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-'+id).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(tId).classList.add('active');
        }

        // РЕДАКТИРОВАНИЕ И УДАЛЕНИЕ
        function editPrice(id, oldPrice) {
            const p = prompt("Новая цена:", oldPrice);
            if(p) db.ref('inventory/'+id).update({price: p});
        }
        function delItem(path) { if(confirm("Удалить?")) db.ref(path).remove(); }

        // ЗАГРУЗКА НОМЕРОВ (ИНВЕНТАРЬ)
        db.ref('inventory').on('value', s => {
            const list = document.getElementById('inv-list');
            list.innerHTML = "";
            const data = s.val() || {};
            document.getElementById('stat').innerText = "НОМЕРОВ: " + Object.keys(data).length;
            Object.keys(data).reverse().forEach(id => {
                const i = data[id];
                list.innerHTML += `
                <div class="card flex justify-between items-center">
                    <div>
                        <div class="font-bold text-sm">+7 ${i.num}</div>
                        <div class="text-[10px] gold-grad font-black">${i.price} ₽ | ${i.op}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editPrice('${id}', '${i.price}')" class="p-2 bg-blue-500/10 text-blue-500 rounded-lg text-[9px]">ЦЕНА</button>
                        <button onclick="delItem('inventory/${id}')" class="p-2 bg-red-500/10 text-red-500 rounded-lg text-[9px]">УДАЛИТЬ</button>
                    </div>
                </div>`;
            });
        });

        // ЗАГРУЗКА ЗАКАЗОВ
        db.ref('orders').on('value', s => {
            const list = document.getElementById('sec-orders');
            list.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).reverse().forEach(id => {
                const o = data[id];
                list.innerHTML += `
                <div class="card border-l-4 border-[#bf953f]">
                    <div class="flex justify-between items-start mb-2">
                        <div class="font-bold italic">+7 ${o.number}</div>
                        <button onclick="delItem('orders/${id}')" class="text-red-500 text-[8px] uppercase">Закрыть</button>
                    </div>
                    <div class="text-[10px] opacity-60">
                        <p>Клиент: ${o.clientName}</p>
                        <p>Связь: <span class="text-white font-bold">${o.clientContact}</span></p>
                    </div>
                </div>`;
            });
        });

        // ЗАГРУЗКА КЛИЕНТОВ
        db.ref('users').on('value', s => {
            const list = document.getElementById('users-list');
            list.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                const u = data[id];
                list.innerHTML += `
                <div class="card flex justify-between items-center">
                    <div class="text-[11px]">
                        <div class="font-bold text-[#bf953f]">${u.phone}</div>
                        <div class="opacity-40">Пароль: ${u.pass} | Код: ${u.word}</div>
                    </div>
                    <button onclick="delItem('users/${id}')" class="text-red-500 text-[8px]">УДАЛИТЬ</button>
                </div>`;
            });
        });

        function addNumber() {
            const num = document.getElementById('n-num').value;
            const price = document.getElementById('n-price').value;
            const op = document.getElementById('n-op').value;
            if(!num || !price) return alert("Заполни всё!");
            db.ref('inventory').push({num, price, op}).then(() => {
                alert("Номер на сайте!");
                document.getElementById('n-num').value = "";
                document.getElementById('n-price').value = "";
            });
        }
    </script>
</body>
</html>
