<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIM ADMIN | ENTERPRISE OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .gold { color: #bf953f; }
        .bg-gold { background: #bf953f; }
        
        /* Адаптивное меню */
        #mobile-menu { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #0a0a0a; z-index: 1000; transition: 0.4s; border-right: 1px solid #1a1a1a; }
        #mobile-menu.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        .overlay.active { display: block; }

        .card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 24px; padding: 18px; margin-bottom: 15px; }
        .nav-item { padding: 18px 25px; font-size: 13px; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid #111; cursor: pointer; color: #555; }
        .nav-item.active { color: #bf953f; background: #151515; border-left: 4px solid #bf953f; }
        
        input, select, textarea { background: #151515 !important; border: 1px solid #222 !important; color: #fff !important; padding: 14px; border-radius: 14px; width: 100%; font-size: 14px; outline: none; }
        table { width: 100%; font-size: 12px; border-collapse: collapse; }
        td, th { padding: 15px 10px; border-bottom: 1px solid #111; text-align: left; }
        .btn-action { background: #bf953f; color: #000; font-weight: 800; padding: 12px; border-radius: 12px; text-transform: uppercase; font-size: 11px; }
        
        #log-box { font-family: monospace; font-size: 10px; color: #666; height: 350px; overflow-y: auto; padding: 10px; }
        .badge { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleMenu()"></div>

    <div id="mobile-menu">
        <div class="p-10 border-b border-white/5">
            <h1 class="text-2xl font-black italic gold uppercase">SIM CORE</h1>
            <p class="text-[9px] opacity-30 tracking-widest mt-1">ADMIN PANEL</p>
        </div>
        <nav>
            <div class="nav-item active" onclick="sw('dash', this)">📊 Аналитика</div>
            <div class="nav-item" onclick="sw('nums', this)">📱 Номера</div>
            <div class="nav-item" onclick="sw('orders', this)">🛍️ Заявки</div>
            <div class="nav-item" onclick="sw('users', this)">👥 Клиенты & Роли</div>
            <div class="nav-item" onclick="sw('cms', this)">🖼️ CMS & Контент</div>
            <div class="nav-item" onclick="sw('security', this)">🛡️ Безопасность</div>
            <div class="nav-item" onclick="sw('logs', this)">📜 Логи действий</div>
        </nav>
    </div>

    <header class="p-5 flex justify-between items-center bg-[#0a0a0a] border-b border-white/5 sticky top-0 z-[500]">
        <button onclick="toggleMenu()" class="text-2xl">☰</button>
        <h2 id="page-title" class="text-[10px] font-black uppercase gold tracking-widest">Аналитика</h2>
        <div class="w-9 h-9 bg-gold rounded-full flex items-center justify-center text-black font-black">K</div>
    </header>

    <main class="p-4">
        
        <section id="s-dash">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="card text-center"><p class="text-[9px] opacity-40 uppercase font-black">Клиенты</p><h3 id="stat-u" class="text-2xl font-black">0</h3></div>
                <div class="card text-center"><p class="text-[9px] opacity-40 uppercase font-black">Заказы</p><h3 id="stat-o" class="text-2xl font-black gold">0</h3></div>
            </div>
            <div class="card"><canvas id="chart"></canvas></div>
        </section>

        <section id="s-nums" class="hidden space-y-4">
            <div class="card space-y-3">
                <input type="text" id="in-num" placeholder="Номер (999...)">
                <input type="number" id="in-price" placeholder="Цена">
                <select id="in-op"><option>МТС</option><option>БИЛАЙН</option><option>МЕГАФОН</option></select>
                <button onclick="addNum()" class="btn-action w-full">Добавить в базу</button>
            </div>
            <div class="card overflow-x-auto">
                <table id="list-nums"></table>
            </div>
        </section>

        <section id="s-orders" class="hidden">
            <div class="card overflow-x-auto">
                <table id="list-orders"></table>
            </div>
        </section>

        <section id="s-users" class="hidden">
            <div class="card overflow-x-auto">
                <p class="text-[9px] opacity-30 uppercase mb-4 tracking-tighter">Нажми на строку для управления клиентом</p>
                <table class="w-full">
                    <thead><tr><th>Клиент</th><th>Роль</th><th>Статус</th></tr></thead>
                    <tbody id="list-users"></tbody>
                </table>
            </div>
        </section>

        <section id="s-cms" class="hidden space-y-4">
            <div class="card space-y-4">
                <h3 class="gold font-black uppercase text-xs italic">Контент сайта</h3>
                <input type="text" id="cms-title" placeholder="Заголовок сайта">
                <textarea id="cms-desc" placeholder="Описание сайта (SEO)" rows="4"></textarea>
                <button onclick="saveCMS()" class="btn-action w-full">Обновить данные</button>
            </div>
        </section>

        <section id="s-security" class="hidden space-y-4">
            <div class="card flex justify-between items-center">
                <span class="text-[11px] font-black uppercase">2FA Защита</span>
                <span class="text-green-500 font-black text-[10px]">АКТИВНО</span>
            </div>
            <div class="card">
                <h3 class="text-[10px] opacity-40 uppercase mb-3">Блокировка по IP</h3>
                <input type="text" placeholder="Введите IP для бана" class="mb-2">
                <button class="bg-red-600/20 text-red-500 w-full p-3 rounded-xl text-[10px] font-black uppercase">Забанить IP</button>
            </div>
        </section>

        <section id="s-logs" class="hidden">
            <div class="card" id="log-box"></div>
        </section>

    </main>

    <div id="user-modal" class="hidden fixed inset-0 bg-black/95 z-[2000] p-6 flex items-center justify-center">
        <div class="card w-full max-w-sm border-gold/30">
            <h3 id="modal-phone" class="text-2xl font-black gold mb-6 italic">Управление</h3>
            <div class="space-y-6">
                <div>
                    <label class="text-[9px] opacity-40 uppercase font-black">Роль в системе</label>
                    <select id="set-role" class="mt-2">
                        <option value="user">Клиент</option>
                        <option value="moder">Модератор</option>
                        <option value="support">Поддержка</option>
                        <option value="admin">Админ</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="applyBan(24)" class="bg-orange-600 text-white p-4 rounded-xl text-[10px] font-black uppercase">Бан 24ч</button>
                    <button onclick="applyBan('forever')" class="bg-red-600 text-white p-4 rounded-xl text-[10px] font-black uppercase">Бан навсегда</button>
                </div>
                <button onclick="unban()" class="w-full border border-green-500 text-green-500 p-4 rounded-xl text-[10px] font-black uppercase">Разблокировать</button>
                <button onclick="closeModal()" class="w-full opacity-30 text-[10px] font-black uppercase mt-4">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const conf = { 
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(conf);
        const db = firebase.database();

        let activeUser = "";

        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        function sw(id, el) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('s-' + id).classList.remove('hidden');
            document.getElementById('page-title').innerText = el.innerText.replace(/[^а-яА-Я]/g, '');
            el.classList.add('active');
            toggleMenu();
            addLog("Переход: " + id);
        }

        function addLog(m) {
            const b = document.getElementById('log-box');
            b.innerHTML = `<div class="mb-1 opacity-50 text-[9px]">[${new Date().toLocaleTimeString()}] ${m}</div>` + b.innerHTML;
        }

        // НОМЕРА
        function addNum() {
            const n = document.getElementById('in-num').value;
            const p = document.getElementById('in-price').value;
            const o = document.getElementById('in-op').value;
            if(!n || !p) return alert("Заполни данные!");
            db.ref('inventory/' + Date.now()).set({ num: n, price: p, op: o }).then(() => {
                alert("Номер в базе!");
                addLog("Добавлен номер: " + n);
            });
        }

        db.ref('inventory').on('value', snap => {
            const list = document.getElementById('list-nums');
            list.innerHTML = "<tr><th>Номер</th><th>Цена</th><th></th></tr>";
            snap.forEach(c => {
                const i = c.val();
                list.innerHTML += `<tr><td class="font-black italic text-lg">+7 ${i.num}</td><td class="gold font-bold">${i.price} ₽</td><td class="text-right"><button onclick="db.ref('inventory/${c.key}').remove()" class="text-red-600">❌</button></td></tr>`;
            });
        });

        // КЛИЕНТЫ И МОДАЛКА
        function openModal(ph, role) {
            activeUser = ph;
            document.getElementById('modal-phone').innerText = "+7 " + ph;
            document.getElementById('set-role').value = role;
            document.getElementById('user-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('user-modal').classList.add('hidden'); }

        db.ref('users').on('value', snap => {
            document.getElementById('stat-u').innerText = snap.numChildren();
            const list = document.getElementById('list-users');
            list.innerHTML = "";
            snap.forEach(c => {
                const u = c.val();
                const ph = c.key;
                const role = u.role || 'user';
                const isBan = u.banned ? (u.banned === 'forever' ? 'BANNED' : 'TEMP') : 'OK';
                list.innerHTML += `<tr onclick="openModal('${ph}', '${role}')" class="active:bg-white/5">
                    <td class="font-black">+7 ${ph}</td>
                    <td><span class="badge border border-white/10">${role}</span></td>
                    <td class="text-[10px] font-black ${u.banned ? 'text-red-500' : 'text-green-500'}">${isBan}</td></tr>`;
            });
        });

        // БАН И РОЛИ
        document.getElementById('set-role').onchange = function() {
            db.ref('users/' + activeUser).update({ role: this.value });
            addLog(`Роль юзера ${activeUser} изменёна на ${this.value}`);
        };

        function applyBan(t) {
            const val = t === 'forever' ? 'forever' : Date.now() + (24*60*60*1000);
            db.ref('users/' + activeUser).update({ banned: val }).then(() => { closeModal(); addLog(`Юзер ${activeUser} ЗАБАНЕН (${t})`); });
        }

        function unban() {
            db.ref('users/' + activeUser).child('banned').remove().then(() => { closeModal(); addLog(`Юзер ${activeUser} РАЗБАНЕН`); });
        }

        // ЗАЯВКИ
        db.ref('orders').on('value', snap => {
            document.getElementById('stat-o').innerText = snap.numChildren();
            const list = document.getElementById('list-orders');
            list.innerHTML = "<tr><th>Клиент</th><th>Номер</th><th>Действие</th></tr>";
            snap.forEach(c => {
                const o = c.val();
                list.innerHTML += `<tr><td class="font-bold">${o.clientName}</td><td class="gold font-black">+7 ${o.wantedNum}</td><td><button onclick="db.ref('orders/${c.key}').remove()" class="text-green-500 font-bold">ОК</button></td></tr>`;
            });
        });

        // ГРАФИК
        new Chart(document.getElementById('chart'), {
            type: 'line',
            data: { labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт'], datasets: [{ data: [10, 25, 15, 30, 45], borderColor: '#bf953f', tension: 0.4 }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { color: '#111' } } } }
        });

        addLog("Система CORE v4.0 запущена.");
    </script>
</body>
</html>
