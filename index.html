<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SimMarket Админ-панель | Управление магазином</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F172A;
            color: #F1F5F9;
            overflow-x: hidden;
        }
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: #1E293B;
            padding: 24px 16px;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s;
        }
        .sidebar h2 {
            font-size: 24px;
            margin-bottom: 32px;
            padding-left: 12px;
        }
        .sidebar h2 span { color: #3B82F6; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #94A3B8;
        }
        .nav-item i { width: 24px; font-size: 18px; }
        .nav-item.active {
            background: #3B82F6;
            color: white;
        }
        .nav-item:hover:not(.active) {
            background: #334155;
            color: #F1F5F9;
        }
        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 24px 32px;
            min-height: 100vh;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #1E293B;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-card .info h3 { font-size: 28px; font-weight: 800; color: #3B82F6; }
        .stat-card .info p { color: #94A3B8; margin-top: 4px; }
        .stat-card i { font-size: 48px; color: #334155; }
        /* Tables */
        .table-container {
            background: #1E293B;
            border-radius: 20px;
            overflow-x: auto;
            padding: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #334155;
        }
        th { color: #94A3B8; font-weight: 600; }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #10B981; color: white; }
        .badge-warning { background: #F59E0B; color: #0F172A; }
        .badge-danger { background: #EF4444; color: white; }
        .btn-icon {
            background: none;
            border: none;
            color: #94A3B8;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .btn-icon:hover { background: #334155; color: white; }
        .btn-primary {
            background: #3B82F6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-danger {
            background: #EF4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1E293B;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 12px;
            color: white;
        }
        .spec-group {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10B981;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            z-index: 1100;
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; }
            .menu-toggle {
                display: block;
                position: fixed;
                top: 16px;
                left: 16px;
                z-index: 101;
                background: #3B82F6;
                border: none;
                color: white;
                padding: 12px;
                border-radius: 12px;
            }
        }
        .menu-toggle { display: none; }
        .empty-state { text-align: center; padding: 40px; color: #64748B; }
        .product-img-small { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

<button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

<div class="sidebar" id="sidebar">
    <h2>Sim<span>Admin</span></h2>
    <div class="nav-item active" data-tab="dashboard">
        <i class="fas fa-chart-line"></i> <span>Дашборд</span>
    </div>
    <div class="nav-item" data-tab="products">
        <i class="fas fa-box"></i> <span>Товары</span>
    </div>
    <div class="nav-item" data-tab="users">
        <i class="fas fa-users"></i> <span>Клиенты</span>
    </div>
    <div class="nav-item" data-tab="orders">
        <i class="fas fa-shopping-cart"></i> <span>Заказы</span>
    </div>
    <div class="nav-item" data-tab="reviews">
        <i class="fas fa-star"></i> <span>Отзывы</span>
    </div>
    <div class="nav-item" data-tab="settings">
        <i class="fas fa-cog"></i> <span>Настройки</span>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="page-header">
        <h1 id="pageTitle">Панель управления</h1>
        <button class="btn-primary" id="actionBtn" style="display:none;">+ Добавить</button>
    </div>
    <div id="contentArea"></div>
</div>

<!-- Modals -->
<div id="productModal" class="modal"><div class="modal-content"><h3 id="modalTitle">Товар</h3><input type="text" id="prodName" placeholder="Название"><input type="number" id="prodPrice" placeholder="Цена"><input type="number" id="prodOldPrice" placeholder="Старая цена"><input type="text" id="prodImage" placeholder="URL фото"><select id="prodCategory"><option>Смартфоны</option><option>Наушники</option><option>Зарядки</option><option>Power Bank</option><option>Гаджеты</option></select><input type="text" id="prodBrand" placeholder="Бренд"><div id="specsContainer"></div><button id="addSpecBtn" style="background:#334155; margin:8px 0;">+ Характеристика</button><button id="saveProductBtn" class="btn-primary">Сохранить</button><button class="btn-danger" id="closeModal" style="margin-top:8px;">Отмена</button></div></div>
<div id="orderModal" class="modal"><div class="modal-content"><h3>Детали заказа</h3><div id="orderDetails"></div><button class="btn-primary" id="updateOrderStatus">Обновить статус</button><button class="btn-danger" id="closeOrderModal">Закрыть</button></div></div>
<div id="reviewModal" class="modal"><div class="modal-content"><h3>Удалить отзыв?</h3><p id="reviewToDelete"></p><button class="btn-danger" id="confirmDeleteReview">Удалить</button><button id="closeReviewModal">Отмена</button></div></div>

<script>
    // Load data
    let products = JSON.parse(localStorage.getItem('sim_products')) || [];
    let users = JSON.parse(localStorage.getItem('sim_users')) || [];
    let orders = JSON.parse(localStorage.getItem('sim_orders')) || [];
    let reviews = JSON.parse(localStorage.getItem('sim_reviews')) || {};

    let currentTab = 'dashboard';

    function saveAll() {
        localStorage.setItem('sim_products', JSON.stringify(products));
        localStorage.setItem('sim_users', JSON.stringify(users));
        localStorage.setItem('sim_orders', JSON.stringify(orders));
        localStorage.setItem('sim_reviews', JSON.stringify(reviews));
    }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function renderDashboard() {
        let totalProducts = products.length;
        let totalUsers = users.length;
        let totalOrders = orders.length;
        let totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
        let pendingOrders = orders.filter(o => o.status === 'Новый').length;

        document.getElementById('contentArea').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><div class="info"><h3>${totalProducts}</h3><p>Товаров</p></div><i class="fas fa-box"></i></div>
                <div class="stat-card"><div class="info"><h3>${totalUsers}</h3><p>Клиентов</p></div><i class="fas fa-users"></i></div>
                <div class="stat-card"><div class="info"><h3>${totalOrders}</h3><p>Заказов</p></div><i class="fas fa-shopping-cart"></i></div>
                <div class="stat-card"><div class="info"><h3>${totalRevenue.toLocaleString()} ₽</h3><p>Выручка</p></div><i class="fas fa-rouble"></i></div>
                <div class="stat-card"><div class="info"><h3>${pendingOrders}</h3><p>Новых заказов</p></div><i class="fas fa-clock"></i></div>
            </div>
            <div class="table-container"><h3 style="margin-bottom:16px;">📦 Последние заказы</h3><table><tr><th>ID</th><th>Клиент</th><th>Сумма</th><th>Статус</th><th></th></tr>
                ${orders.slice(0,5).map(o => `<tr><td>#${o.id}</td><td>${o.customerName}</td><td>${o.total.toLocaleString()} ₽</td><td><span class="badge ${o.status === 'Новый' ? 'badge-warning' : 'badge-success'}">${o.status}</span></td><td><button class="btn-icon" onclick="viewOrder(${o.id})"><i class="fas fa-eye"></i></button></td></tr>`).join('')}
                ${orders.length === 0 ? '<tr><td colspan="5" class="empty-state">Нет заказов</td></tr>' : ''}
            </table></div>
        `;
    }

    function renderProducts() {
        document.getElementById('actionBtn').style.display = 'block';
        document.getElementById('actionBtn').innerHTML = '+ Добавить товар';
        document.getElementById('actionBtn').onclick = () => openProductModal();
        
        document.getElementById('contentArea').innerHTML = `
            <div class="table-container">
                <table>
                    <tr><th>Фото</th><th>Название</th><th>Цена</th><th>Категория</th><th>Бренд</th><th>Действия</th></tr>
                    ${products.map(p => `
                        <tr>
                            <td><img src="${p.image}" class="product-img-small" onerror="this.src='https://placehold.co/50x50'"></td>
                            <td>${p.name}</td>
                            <td>${p.price.toLocaleString()} ₽</td>
                            <td>${p.category}</td>
                            <td>${p.brand}</td>
                            <td><button class="btn-icon" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button> <button class="btn-icon" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button></td>
                        </tr>
                    `).join('')}
                    ${products.length === 0 ? '<tr><td colspan="6" class="empty-state">Нет товаров. Добавьте первый!</td></tr>' : ''}
                </table>
            </div>
        `;
    }

    function renderUsers() {
        document.getElementById('actionBtn').style.display = 'none';
        document.getElementById('contentArea').innerHTML = `
            <div class="table-container">
                <table>
                    <tr><th>ID</th><th>Имя</th><th>Телефон</th><th>Дата регистрации</th><th>Действия</th></tr>
                    ${users.map(u => `
                        <tr>
                            <td>#${u.id}</td>
                            <td>${u.name}</td>
                            <td>${u.phone}</td>
                            <td>${new Date(u.createdAt || Date.now()).toLocaleDateString()}</td>
                            <td><button class="btn-icon" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i></button></td>
                        </tr>
                    `).join('')}
                    ${users.length === 0 ? '<tr><td colspan="5" class="empty-state">Нет зарегистрированных клиентов</td></tr>' : ''}
                </table>
            </div>
        `;
    }

    function renderOrders() {
        document.getElementById('actionBtn').style.display = 'none';
        document.getElementById('contentArea').innerHTML = `
            <div class="table-container">
                <table>
                    <tr><th>ID</th><th>Клиент</th><th>Телефон</th><th>Адрес</th><th>Сумма</th><th>Статус</th><th>Действия</th></tr>
                    ${orders.map(o => `
                        <tr>
                            <td>#${o.id}</td>
                            <td>${o.customerName}</td>
                            <td>${o.customerPhone}</td>
                            <td>${o.address}</td>
                            <td>${o.total.toLocaleString()} ₽</td>
                            <td><select onchange="updateOrderStatus(${o.id}, this.value)" class="badge" style="background:#334155; color:white;">${['Новый','В обработке','Доставлен','Завершён'].map(s => `<option ${o.status===s ? 'selected' : ''}>${s}</option>`).join('')}</td>
                            <td><button class="btn-icon" onclick="viewOrder(${o.id})"><i class="fas fa-eye"></i></button> <button class="btn-icon" onclick="deleteOrder(${o.id})"><i class="fas fa-trash"></i></button></td>
                        </tr>
                    `).join('')}
                    ${orders.length === 0 ? '<tr><td colspan="7" class="empty-state">Нет заказов</td></tr>' : ''}
                </table>
            </div>
        `;
    }

    function renderReviews() {
        document.getElementById('actionBtn').style.display = 'none';
        let allReviews = [];
        for(let productId in reviews) {
            reviews[productId].forEach(r => {
                let product = products.find(p => p.id == productId);
                allReviews.push({ ...r, productId, productName: product?.name || 'Товар удалён' });
            });
        }
        document.getElementById('contentArea').innerHTML = `
            <div class="table-container">
                <table>
                    <tr><th>Товар</th><th>Пользователь</th><th>Рейтинг</th><th>Отзыв</th><th>Дата</th><th>Действия</th></tr>
                    ${allReviews.map((r, idx) => `
                        <tr>
                            <td>${r.productName}</td>
                            <td>${r.userName}</td>
                            <td>${'★'.repeat(r.rating)}</td>
                            <td style="max-width:300px;">${r.text.substring(0,50)}...</td>
                            <td>${r.date}</td>
                            <td><button class="btn-icon" onclick="deleteReview('${r.productId}', ${idx})"><i class="fas fa-trash"></i></button></td>
                        </tr>
                    `).join('')}
                    ${allReviews.length === 0 ? '<tr><td colspan="6" class="empty-state">Нет отзывов</td></tr>' : ''}
                </table>
            </div>
        `;
    }

    function renderSettings() {
        document.getElementById('actionBtn').style.display = 'none';
        document.getElementById('contentArea').innerHTML = `
            <div class="table-container">
                <h3>⚙️ Настройки магазина</h3>
                <div style="margin:20px 0;"><button class="btn-danger" onclick="clearAllData()">🗑️ Очистить все данные</button> <span style="margin-left:12px; color:#94A3B8;">Удалить все товары, клиентов, заказы</span></div>
                <div><button class="btn-primary" onclick="exportData()">📥 Экспорт данных (JSON)</button> <button class="btn-primary" onclick="importData()" style="margin-left:12px;">📤 Импорт данных</button><input type="file" id="importFile" style="display:none;" accept=".json"></div>
            </div>
        `;
    }

    // Product CRUD
    function openProductModal(product = null) {
        document.getElementById('productModal').style.display = 'flex';
        if(product) {
            document.getElementById('modalTitle').innerText = 'Редактировать товар';
            document.getElementById('prodName').value = product.name;
            document.getElementById('prodPrice').value = product.price;
            document.getElementById('prodOldPrice').value = product.oldPrice || '';
            document.getElementById('prodImage').value = product.image;
            document.getElementById('prodCategory').value = product.category;
            document.getElementById('prodBrand').value = product.brand;
            let specsHtml = '';
            if(product.specs) product.specs.forEach((s,i) => { specsHtml += `<div class="spec-group"><input value="${s.key}" placeholder="Характеристика"><input value="${s.value}" placeholder="Значение"><button onclick="this.parentElement.remove()">✖</button></div>`; });
            document.getElementById('specsContainer').innerHTML = specsHtml || '<div class="spec-group"><input placeholder="Характеристика"><input placeholder="Значение"><button onclick="this.parentElement.remove()">✖</button></div>';
            document.getElementById('saveProductBtn').onclick = () => saveProduct(product.id);
        } else {
            document.getElementById('modalTitle').innerText = 'Новый товар';
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodOldPrice').value = '';
            document.getElementById('prodImage').value = '';
            document.getElementById('prodBrand').value = '';
            document.getElementById('specsContainer').innerHTML = '<div class="spec-group"><input placeholder="Характеристика"><input placeholder="Значение"><button onclick="this.parentElement.remove()">✖</button></div>';
            document.getElementById('saveProductBtn').onclick = () => saveProduct();
        }
    }

    function saveProduct(id = null) {
        let name = document.getElementById('prodName').value;
        let price = parseFloat(document.getElementById('prodPrice').value);
        let oldPrice = parseFloat(document.getElementById('prodOldPrice').value) || null;
        let image = document.getElementById('prodImage').value;
        let category = document.getElementById('prodCategory').value;
        let brand = document.getElementById('prodBrand').value;
        if(!name || !price || !image || !brand) { showToast("Заполните все поля"); return; }
        let specs = [];
        document.querySelectorAll('#specsContainer .spec-group').forEach(g => {
            let inputs = g.querySelectorAll('input');
            if(inputs[0].value && inputs[1].value) specs.push({ key: inputs[0].value, value: inputs[1].value });
        });
        if(id) {
            let index = products.findIndex(p => p.id === id);
            if(index !== -1) products[index] = { ...products[index], name, price, oldPrice, image, category, brand, specs };
        } else {
            products.push({ id: Date.now(), name, price, oldPrice, image, category, brand, specs });
        }
        saveAll();
        document.getElementById('productModal').style.display = 'none';
        renderProducts();
        showToast("✅ Товар сохранён");
    }

    function editProduct(id) { openProductModal(products.find(p => p.id === id)); }
    function deleteProduct(id) { if(confirm("Удалить товар?")) { products = products.filter(p => p.id !== id); saveAll(); renderProducts(); showToast("Товар удалён"); } }
    function deleteUser(id) { if(confirm("Удалить клиента?")) { users = users.filter(u => u.id !== id); saveAll(); renderUsers(); showToast("Клиент удалён"); } }
    function deleteOrder(id) { if(confirm("Удалить заказ?")) { orders = orders.filter(o => o.id !== id); saveAll(); renderOrders(); showToast("Заказ удалён"); } }
    function updateOrderStatus(id, status) { let order = orders.find(o => o.id === id); if(order) { order.status = status; saveAll(); renderOrders(); showToast("Статус обновлён"); } }
    function viewOrder(id) { let order = orders.find(o => o.id === id); if(order) alert(`Заказ #${order.id}\nКлиент: ${order.customerName}\nТелефон: ${order.customerPhone}\nАдрес: ${order.address}\nТовары: ${order.items?.map(i => `${i.name} x${i.qty}`).join(', ')}\nСумма: ${order.total} ₽\nСтатус: ${order.status}`); }
    function deleteReview(productId, idx) { if(confirm("Удалить отзыв?")) { reviews[productId].splice(idx,1); if(reviews[productId].length === 0) delete reviews[productId]; saveAll(); renderReviews(); showToast("Отзыв удалён"); } }
    function clearAllData() { if(confirm("ВНИМАНИЕ! Удалить ВСЕ данные? (товары, клиенты, заказы, отзывы)")) { products = []; users = []; orders = []; reviews = {}; saveAll(); renderDashboard(); showToast("Все данные очищены"); } }
    function exportData() { let data = { products, users, orders, reviews }; let blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'}); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'simmarket_backup.json'; a.click(); }
    function importData() { document.getElementById('importFile').click(); document.getElementById('importFile').onchange = (e) => { let file = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => { let data = JSON.parse(ev.target.result); if(data.products) products = data.products; if(data.users) users = data.users; if(data.orders) orders = data.orders; if(data.reviews) reviews = data.reviews; saveAll(); showToast("Данные импортированы"); renderDashboard(); }; reader.readAsText(file); }; }

    document.getElementById('addSpecBtn').onclick = () => { let div = document.createElement('div'); div.className = 'spec-group'; div.innerHTML = '<input placeholder="Характеристика"><input placeholder="Значение"><button onclick="this.parentElement.remove()">✖</button>'; document.getElementById('specsContainer').appendChild(div); };
    document.getElementById('closeModal').onclick = () => document.getElementById('productModal').style.display = 'none';
    document.getElementById('closeOrderModal').onclick = () => document.getElementById('orderModal').style.display = 'none';
    document.getElementById('closeReviewModal').onclick = () => document.getElementById('reviewModal').style.display = 'none';

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');
        document.getElementById('pageTitle').innerText = { dashboard:'Панель управления', products:'Управление товарами', users:'Клиенты', orders:'Заказы', reviews:'Отзывы', settings:'Настройки' }[tab];
        if(tab === 'dashboard') renderDashboard();
        else if(tab === 'products') renderProducts();
        else if(tab === 'users') renderUsers();
        else if(tab === 'orders') renderOrders();
        else if(tab === 'reviews') renderReviews();
        else if(tab === 'settings') renderSettings();
    }

    document.querySelectorAll('.nav-item').forEach(item => { item.onclick = () => switchTab(item.dataset.tab); });
    document.getElementById('menuToggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');

    switchTab('dashboard');
</script>
