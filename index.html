<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM ADMIN | CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background: #0a0a0a; color: #fff; }
        .gold-border { border: 1px solid rgba(191,149,63,0.3); }
        .tab-btn { padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: 1px solid #222; color: #555; transition: 0.3s; }
        .tab-btn.active { background: #bf953f; color: #000; border-color: #bf953f; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; }
    </style>
</head>
<body class="p-4 pb-20">

    <header class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-[#bf953f]">SIM ADMIN</h1>
            <p class="text-[10px] opacity-40 uppercase tracking-widest">Управление системой</p>
        </div>
        <div class="text-right">
            <div id="count-users" class="text-[10px] font-bold text-green-500">Загрузка...</div>
        </div>
    </header>

    <div class="grid grid-cols-3 gap-2 mb-8">
        <div class="tab-btn active" id="t1" onclick="showSec('orders', 't1')">Заказы</div>
        <div class="tab-btn" id="t2" onclick="showSec('users', 't2')">Клиенты</div>
        <div class="tab-btn" id="t3" onclick="showSec('add', 't3')">+ Номер</div>
    </div>

    <div id="sec-orders" class="space-y-4">
        <h2 class="text-sm font-bold uppercase opacity-30">Новые заявки</h2>
        <div id="orders-list" class="space-y-3"></div>
    </div>

    <div id="sec-users" class="hidden space-y-4">
        <h2 class="text-sm font-bold uppercase opacity-30">База пользователей</h2>
        <div id="users-list" class="space-y-3"></div>
    </div>

    <div id="sec-add" class="hidden card space-y-4">
        <h2 class="text-sm font-bold uppercase gold-grad">Добавить в продажу</h2>
        <input type="text" id="n-num" placeholder="Номер (без +7)" class="w-full bg-[#050505] p-4 rounded-xl border border-[#222] outline-none">
        <input type="number" id="n-price" placeholder="Цена (руб)" class="w-full bg-[#050505] p-4 rounded-xl border border-[#222] outline-none">
        <select id="n-op" class="w-full bg-[#050505] p-4 rounded-xl border border-[#222] outline-none text-gray-400">
            <option value="МТС">МТС</option>
            <option value="БИЛАЙН">БИЛАЙН</option>
            <option value="МЕГАФОН">МЕГАФОН</option>
            <option value="ТЕЛЕ2">ТЕЛЕ2</option>
        </select>
        <button onclick="addNumber()" class="w-full py-4 bg-[#bf953f] text-black font-black rounded-xl uppercase text-xs">Опубликовать</button>
    </div>

    <script>
        const fbCfg = { 
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
            authDomain: "nnnmb-a0b52.firebaseapp.com", 
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com", 
            projectId: "nnnmb-a0b52" 
        };
        firebase.initializeApp(fbCfg);
        const db = firebase.database();

        function showSec(id, tabId) {
            document.querySelectorAll('[id^="sec-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // ДОБАВЛЕНИЕ НОМЕРА
        function addNumber() {
            const num = document.getElementById('n-num').value;
            const price = document.getElementById('n-price').value;
            const op = document.getElementById('n-op').value;
            if(!num || !price) return alert("Заполни поля!");
            db.ref('inventory').push({num, price, op}).then(() => {
                alert("Номер добавлен!");
                location.reload();
            });
        }

        // СПИСОК ЗАКАЗОВ
        db.ref('orders').on('value', s => {
            const list = document.getElementById('orders-list');
            list.innerHTML = "";
            const data = s.val();
            if(!data) list.innerHTML = "<p class='opacity-20 text-xs'>Заказов пока нет</p>";
            else {
                Object.keys(data).reverse().forEach(id => {
                    const o = data[id];
                    list.innerHTML += `
                    <div class="card border-l-4 border-l-[#bf953f]">
                        <div class="flex justify-between items-start mb-2">
                            <div class="text-lg font-bold italic">+7 ${o.number}</div>
                            <button onclick="delItem('orders/${id}')" class="text-[9px] text-red-500 uppercase">Удалить</button>
                        </div>
                        <div class="text-[11px] space-y-1 opacity-70">
                            <p>👤 Клиент: <span class="text-white">${o.clientName}</span></p>
                            <p>📞 Связь: <span class="text-[#bf953f] font-bold">${o.clientContact}</span></p>
                            <p>📅 Дата: ${o.date}</p>
                        </div>
                    </div>`;
                });
            }
        });

        // СПИСОК КЛИЕНТОВ
        db.ref('users').on('value', s => {
            const list = document.getElementById('users-list');
            const countDiv = document.getElementById('count-users');
            list.innerHTML = "";
            const data = s.val();
            const count = data ? Object.keys(data).length : 0;
            countDiv.innerText = "КЛИЕНТОВ: " + count;

            if(!data) list.innerHTML = "<p class='opacity-20 text-xs'>Пользователей нет</p>";
            else {
                Object.keys(data).forEach(id => {
                    const u = data[id];
                    list.innerHTML += `
                    <div class="card flex justify-between items-center">
                        <div>
                            <div class="text-xs font-bold text-[#bf953f]">${u.phone}</div>
                            <div class="text-[9px] opacity-40">Пароль: ${u.pass} | Код: ${u.word}</div>
                        </div>
                        <button onclick="delItem('users/${id}')" class="bg-red-500/10 text-red-500 p-2 rounded-lg text-[10px]">Удалить</button>
                    </div>`;
                });
            }
        });

        function delItem(path) {
            if(confirm("Удалить запись навсегда?")) {
                db.ref(path).remove();
            }
        }
    </script>
</body>
</html>
