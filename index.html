<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIM ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .gold { color: #bf953f; }
        .card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 20px; padding: 15px; margin-bottom: 10px; }
        input, select { background: #151515!important; color: #fff!important; padding: 12px; border-radius: 12px; width: 100%; border: 1px solid #222; }
        table { width: 100%; font-size: 13px; text-align: left; }
        th { opacity: 0.3; padding: 10px; }
        td { padding: 15px 10px; border-bottom: 1px solid #111; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <header class="p-5 border-b border-white/5 flex justify-between">
        <h2 class="gold font-black">SIM ADMIN</h2>
        <span class="opacity-30">v4.0</span>
    </header>

    <main class="p-4">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="card text-center"><p class="text-[10px] opacity-30">КЛИЕНТЫ</p><h3 id="c-count" class="text-xl font-bold">0</h3></div>
            <div class="card text-center"><p class="text-[10px] opacity-30">ЗАЯВКИ</p><h3 id="o-count" class="text-xl font-bold gold">0</h3></div>
        </div>

        <div class="card">
            <h3 class="mb-4 font-bold uppercase text-xs opacity-50 italic">Добавить номер</h3>
            <div class="space-y-3">
                <input type="text" id="n-val" placeholder="Номер">
                <input type="number" id="p-val" placeholder="Цена">
                <select id="o-val"><option>МТС</option><option>БИЛАЙН</option><option>МЕГАФОН</option></select>
                <button onclick="addN()" class="w-full bg-[#bf953f] text-black font-black py-3 rounded-xl uppercase text-xs">Добавить</button>
            </div>
        </div>

        <div class="card overflow-x-auto mt-6">
            <h3 class="mb-4 font-bold uppercase text-xs opacity-50 italic">База клиентов</h3>
            <table>
                <thead><tr><th>Телефон</th><th>Статус</th><th></th></tr></thead>
                <tbody id="user-list"></tbody>
            </table>
        </div>
    </main>

    <div id="u-modal" class="modal">
        <div class="card w-full max-w-sm border-gold/30">
            <h3 id="u-phone" class="text-xl font-black gold mb-6">Управление</h3>
            <div class="space-y-4">
                <button onclick="applyBan(24)" class="w-full bg-orange-600 p-4 rounded-xl font-black uppercase text-xs">Бан на 24 часа</button>
                <button onclick="applyBan('forever')" class="w-full bg-red-600 p-4 rounded-xl font-black uppercase text-xs">Бан НАВСЕГДА</button>
                <button onclick="unban()" class="w-full border border-green-500 text-green-500 p-4 rounded-xl font-black uppercase text-xs">Разблокировать</button>
                <button onclick="closeM()" class="w-full opacity-20 uppercase text-[10px] mt-4">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const config = { 
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let activeUser = "";

        function closeM() { document.getElementById('u-modal').classList.remove('active'); }
        function openM(ph) { activeUser = ph; document.getElementById('u-phone').innerText = "+7 " + ph; document.getElementById('u-modal').classList.add('active'); }

        // ЗАГРУЗКА КЛИЕНТОВ
        db.ref('users').on('value', snap => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            let count = 0;
            snap.forEach(c => {
                count++;
                const u = c.val();
                const ph = c.key;
                let status = "✅ OK";
                if(u.banned) status = (u.banned === 'forever') ? "🚫 PERM" : "⏳ 24H";
                list.innerHTML += `<tr>
                    <td class="font-bold">+7 ${ph}</td>
                    <td class="${u.banned ? 'text-red-500' : 'text-green-500'}">${status}</td>
                    <td><button onclick="openM('${ph}')">⚙️</button></td>
                </tr>`;
            });
            document.getElementById('c-count').innerText = count;
        });

        // БАН
        function applyBan(type) {
            const val = (type === 'forever') ? 'forever' : Date.now() + (24*60*60*1000);
            db.ref('users/' + activeUser).update({ banned: val }).then(() => { closeM(); alert("Забанен"); });
        }
        function unban() {
            db.ref('users/' + activeUser + '/banned').remove().then(() => { closeM(); alert("Разбанен"); });
        }

        function addN() {
            const n = document.getElementById('n-val').value;
            const p = document.getElementById('p-val').value;
            const o = document.getElementById('o-val').value;
            db.ref('inventory/' + Date.now()).set({ num: n, price: p, op: o }).then(() => alert("Ок"));
        }
        
        db.ref('orders').on('value', snap => { document.getElementById('o-count').innerText = snap.numChildren(); });
    </script>
</body>
</html>
