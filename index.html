<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIM ADMIN PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background: #000; color: #fff; margin: 0; padding: 0; }
        .gold { color: #bf953f; }
        .bg-gold { background: #bf953f; }
        
        /* Мобильное меню */
        #mobile-menu { position: fixed; top: 0; left: -100%; width: 80%; height: 100%; background: #0a0a0a; z-index: 1000; transition: 0.4s; border-right: 1px solid #1a1a1a; }
        #mobile-menu.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        .overlay.active { display: block; }

        .card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .nav-item { padding: 15px 25px; font-size: 14px; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid #111; cursor: pointer; }
        .nav-item.active { color: #bf953f; background: #151515; }
        
        input, select, textarea { background: #151515 !important; border: 1px solid #222 !important; color: #fff !important; padding: 12px; border-radius: 12px; width: 100%; font-size: 14px; }
        table { width: 100%; font-size: 12px; }
        td, th { padding: 12px 8px; border-bottom: 1px solid #111; text-align: left; }
        .btn-action { background: #bf953f; color: #000; font-weight: 800; padding: 10px; border-radius: 10px; text-transform: uppercase; font-size: 10px; }
        
        #log-box { font-family: monospace; font-size: 10px; color: #666; height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleMenu()"></div>

    <div id="mobile-menu">
        <div class="p-8 border-b border-white/5">
            <h1 class="text-xl font-black italic gold uppercase">SIM CORE</h1>
        </div>
        <nav>
            <div class="nav-item active" onclick="sw('dash', this)">📊 Аналитика</div>
            <div class="nav-item" onclick="sw('nums', this)">📱 Номера</div>
            <div class="nav-item" onclick="sw('orders', this)">🛍️ Заявки</div>
            <div class="nav-item" onclick="sw('users', this)">👥 Клиенты</div>
            <div class="nav-item" onclick="sw('cms', this)">🖼️ CMS</div>
            <div class="nav-item" onclick="sw('support', this)">🎫 Поддержка</div>
            <div class="nav-item" onclick="sw('security', this)">🛡️ Безопасность</div>
            <div class="nav-item" onclick="sw('logs', this)">📜 Логи</div>
        </nav>
    </div>

    <header class="p-4 flex justify-between items-center bg-[#0a0a0a] border-b border-white/5 sticky top-0 z-[500]">
        <button onclick="toggleMenu()" class="text-2xl">☰</button>
        <h2 id="page-title" class="text-xs font-black uppercase gold">Аналитика</h2>
        <div class="w-8 h-8 bg-gold rounded-full flex items-center justify-center text-black font-bold">K</div>
    </header>

    <main class="p-4">
        
        <section id="s-dash">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="card text-center"><p class="text-[10px] opacity-40 uppercase">Юзеры</p><h3 id="stat-u" class="text-xl font-black">0</h3></div>
                <div class="card text-center"><p class="text-[10px] opacity-40 uppercase">Заказы</p><h3 id="stat-o" class="text-xl font-black gold">0</h3></div>
            </div>
            <div class="card"><canvas id="chart"></canvas></div>
        </section>

        <section id="s-nums" class="hidden space-y-4">
            <div class="card space-y-3">
                <input type="text" id="in-num" placeholder="Номер (999...)">
                <input type="number" id="in-price" placeholder="Цена">
                <select id="in-op"><option>МТС</option><option>БИЛАЙН</option><option>МЕГАФОН</option></select>
                <button onclick="addNum()" class="btn-action w-full">Добавить номер</button>
            </div>
            <div class="card overflow-x-auto">
                <table id="list-nums"></table>
            </div>
        </section>

        <section id="s-orders" class="hidden">
            <div class="card overflow-x-auto">
                <table id="list-orders"></table>
            </div>
        </section>

        <section id="s-users" class="hidden">
            <div class="card overflow-x-auto">
                <table id="list-users"></table>
            </div>
        </section>

        <section id="s-cms" class="hidden">
            <div class="card space-y-4">
                <h3 class="gold font-black uppercase text-xs">Настройки сайта</h3>
                <input type="text" id="cms-title" placeholder="Заголовок сайта">
                <textarea id="cms-desc" placeholder="Описание"></textarea>
                <button onclick="saveCMS()" class="btn-action w-full">Сохранить</button>
            </div>
        </section>

        <section id="s-support" class="hidden">
            <div class="card">
                <p class="opacity-30 text-xs text-center py-10 uppercase">Тикетов нет</p>
            </div>
        </section>

        <section id="s-security" class="hidden space-y-4">
            <div class="card flex justify-between items-center">
                <span class="text-xs font-bold uppercase">2FA Защита</span>
                <span class="text-green-500 font-bold text-xs">АКТИВНО</span>
            </div>
            <div class="card">
                <h3 class="text-[10px] opacity-40 uppercase mb-3">Бан-лист IP</h3>
                <div class="text-xs opacity-50">Список пуст</div>
            </div>
        </section>

        <section id="s-logs" class="hidden">
            <div class="card" id="log-box"></div>
        </section>

    </main>

    <script>
        const fb = firebase.initializeApp({ 
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com" 
        });
        const db = fb.database();

        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        function sw(id, el) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('s-' + id).classList.remove('hidden');
            document.getElementById('page-title').innerText = el.innerText.replace(/[^а-яА-Яa-zA-Z]/g, '');
            el.classList.add('active');
            toggleMenu();
            addLog("Переход: " + id);
        }

        function addLog(m) {
            const b = document.getElementById('log-box');
            b.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${m}</div>` + b.innerHTML;
        }

        // РАБОЧИЕ ФУНКЦИИ
        function addNum() {
            const n = document.getElementById('in-num').value;
            const p = document.getElementById('in-price').value;
            const o = document.getElementById('in-op').value;
            if(!n || !p) return alert("Заполни!");
            db.ref('inventory/' + Date.now()).set({ num: n, price: p, op: o }).then(() => {
                alert("Добавлено!");
                addLog("Добавлен номер: " + n);
            });
        }

        function saveCMS() {
            const t = document.getElementById('cms-title').value;
            db.ref('settings').set({ title: t }).then(() => {
                alert("Сайт обновлен!");
                addLog("CMS изменена");
            });
        }

        // ОБНОВЛЕНИЕ ДАННЫХ
        db.ref('inventory').on('value', snap => {
            const list = document.getElementById('list-nums');
            list.innerHTML = "<tr><th>Номер</th><th>Цена</th><th></th></tr>";
            snap.forEach(child => {
                const i = child.val();
                list.innerHTML += `<tr><td class="font-bold">+7 ${i.num}</td><td class="gold">${i.price}</td><td><button onclick="db.ref('inventory/${child.key}').remove()" class="text-red-500">❌</button></td></tr>`;
            });
        });

        db.ref('users').on('value', snap => {
            document.getElementById('stat-u').innerText = snap.numChildren();
            const list = document.getElementById('list-users');
            list.innerHTML = "<tr><th>Клиент</th><th>Пароль</th></tr>";
            snap.forEach(child => {
                list.innerHTML += `<tr><td>+7 ${child.key}</td><td class="opacity-40">${child.val().pass}</td></tr>`;
            });
        });

        db.ref('orders').on('value', snap => {
            document.getElementById('stat-o').innerText = snap.numChildren();
            const list = document.getElementById('list-orders');
            list.innerHTML = "<tr><th>Имя</th><th>Заказ</th></tr>";
            snap.forEach(child => {
                const o = child.val();
                list.innerHTML += `<tr><td class="font-bold">${o.clientName}</td><td class="gold">+7 ${o.wantedNum}</td></tr>`;
            });
        });

        // ГРАФИК
        const ctx = document.getElementById('chart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: { labels: ['1', '2', '3', '4', '5'], datasets: [{ data: [2, 5, 4, 8, 12], borderColor: '#bf953f', tension: 0.4 }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
        });

        addLog("Система готова.");
    </script>
</body>
</html>
