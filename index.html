                <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIM CORE MOBILE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --gold: #bf953f; --dark: #0a0a0a; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; -webkit-tap-highlight-color: transparent; }
        
        /* Мобильное меню */
        .mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 12px; z-index: 100; backdrop-filter: blur(10px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #555; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { color: var(--gold); }
        
        /* Карточки и контент */
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; }
        .tab-content { display: none; padding: 20px; padding-bottom: 100px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input, textarea, select { background: #151515!important; border: 1px solid #222!important; color: #fff!important; padding: 14px; border-radius: 12px; font-size: 16px; width: 100%; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 900; padding: 16px; border-radius: 14px; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header class="p-5 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#0a0a0a] z-50">
        <h1 class="text-xl font-black italic text-white">SIM<span class="text-[#bf953f]">CORE</span></h1>
        <div class="flex gap-3">
            <span id="lead-indicator" class="w-2 h-2 bg-red-500 rounded-full animate-pulse hidden"></span>
            <i data-lucide="bell" class="w-5 text-gray-500"></i>
        </div>
    </header>

    <section id="dash" class="tab-content active">
        <h2 class="text-2xl font-black mb-6 uppercase">Статистика</h2>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="card"><p class="text-[10px] opacity-40 uppercase font-bold">Юзеры</p><h3 id="u-count" class="text-2xl font-black text-[#bf953f]">0</h3></div>
            <div class="card"><p class="text-[10px] opacity-40 uppercase font-bold">Заявки</p><h3 id="l-count" class="text-2xl font-black">0</h3></div>
        </div>
        
        <div class="card space-y-4">
            <h4 class="text-xs font-bold uppercase opacity-50">Быстрый доступ</h4>
            <button class="w-full text-left p-4 bg-white/5 rounded-xl flex items-center gap-3" onclick="document.querySelector('[onclick*=\'users\']').click()">
                <i data-lucide="users" class="w-5 text-[#bf953f]"></i> Управление юзерами
            </button>
            <button class="w-full text-left p-4 bg-white/5 rounded-xl flex items-center gap-3" onclick="document.querySelector('[onclick*=\'pages\']').click()">
                <i data-lucide="edit-3" class="w-5 text-[#bf953f]"></i> Изменить цены/текст
            </button>
        </div>
    </section>

    <section id="users" class="tab-content">
        <h2 class="text-2xl font-black mb-6 uppercase">Клиенты</h2>
        <div id="user-list" class="space-y-3">
            </div>
    </section>

    <section id="pages" class="tab-content">
        <h2 class="text-2xl font-black mb-6 uppercase">Контент</h2>
        <div class="card space-y-5">
            <div>
                <label class="text-[10px] font-bold opacity-30 uppercase ml-1">Заголовок сайта</label>
                <input type="text" id="site-title" value="SIM MARKET">
            </div>
            <div>
                <label class="text-[10px] font-bold opacity-30 uppercase ml-1">Описание (SEO)</label>
                <textarea id="site-desc" rows="3">Красивые номера в Дагестане</textarea>
            </div>
            <button class="btn-gold" onclick="saveSEO()">Сохранить изменения</button>
        </div>
    </section>

    <section id="settings" class="tab-content">
        <h2 class="text-2xl font-black mb-6 uppercase">Настройки</h2>
        <div class="card space-y-4">
            <div class="flex justify-between items-center p-2">
                <span>Безопасность (2FA)</span>
                <div class="w-12 h-6 bg-green-500/20 rounded-full flex items-center px-1">
                    <div class="w-4 h-4 bg-green-500 rounded-full"></div>
                </div>
            </div>
            <div class="pt-4 border-t border-white/5">
                <p class="text-[10px] opacity-30 mb-2 uppercase">Ваш IP: 192.168.1.1</p>
                <button class="w-full py-3 bg-red-500/10 text-red-500 rounded-xl font-bold text-sm">Выйти из системы</button>
            </div>
        </div>
    </section>

    <nav class="mobile-nav">
        <div class="nav-item active" onclick="showTab('dash', this)"><i data-lucide="layout-grid"></i><span>Главная</span></div>
        <div class="nav-item" onclick="showTab('users', this)"><i data-lucide="users"></i><span>Юзеры</span></div>
        <div class="nav-item" onclick="showTab('pages', this)"><i data-lucide="layers"></i><span>Сайт</span></div>
        <div class="nav-item" onclick="showTab('settings', this)"><i data-lucide="settings"></i><span>Опции</span></div>
    </nav>

<script>
    // Твои настройки Firebase
    const firebaseConfig = { 
        apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
        databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        lucide.createIcons();
    }

    // Загрузка пользователей в мобильном стиле
    function syncData() {
        // Юзеры
        db.ref('users').on('value', snap => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            let count = 0;
            snap.forEach(child => {
                count++;
                const u = child.val();
                list.innerHTML += `
                    <div class="card flex justify-between items-center">
                        <div>
                            <p class="font-bold text-[#bf953f]">${u.name || 'Клиент'}</p>
                            <p class="text-xs opacity-40">+7 ${child.key}</p>
                        </div>
                        <button onclick="manageUser('${child.key}')" class="bg-white/5 p-3 rounded-lg">
                            <i data-lucide="more-horizontal" class="w-4"></i>
                        </button>
                    </div>`;
            });
            document.getElementById('u-count').innerText = count;
            lucide.createIcons();
        });

        // Заявки
        db.ref('orders').on('value', snap => {
            let count = 0;
            snap.forEach(() => count++);
            document.getElementById('l-count').innerText = count;
            if(count > 0) document.getElementById('lead-indicator').classList.remove('hidden');
        });
    }

    function manageUser(phone) {
        const action = confirm("Заблокировать пользователя " + phone + "?");
        if(action) db.ref('users/' + phone).update({ banned: true });
    }

    function saveSEO() {
        alert("Настройки сохранены!");
    }

    window.onload = () => {
        syncData();
        lucide.createIcons();
    };
</script>
</body>
</html>
