<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SimMarket PRO Админ-панель | Полный контроль</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0F172A;
            color: #F1F5F9;
            overflow-x: hidden;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: #1E293B;
            padding: 24px 16px;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s;
        }
        .sidebar h2 {
            font-size: 24px;
            margin-bottom: 32px;
            padding-left: 12px;
        }
        .sidebar h2 span { color: #3B82F6; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #94A3B8;
        }
        .nav-item i { width: 24px; font-size: 18px; }
        .nav-item.active {
            background: #3B82F6;
            color: white;
        }
        .nav-item:hover:not(.active) {
            background: #334155;
            color: #F1F5F9;
        }
        .main-content {
            margin-left: 280px;
            padding: 24px 32px;
            min-height: 100vh;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .page-header h1 { font-size: 28px; font-weight: 700; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #1E293B;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-card .info h3 { font-size: 28px; font-weight: 800; color: #3B82F6; }
        .stat-card .info p { color: #94A3B8; margin-top: 4px; }
        .stat-card i { font-size: 48px; color: #334155; }
        .table-container {
            background: #1E293B;
            border-radius: 20px;
            overflow-x: auto;
            padding: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #334155;
        }
        th { color: #94A3B8; font-weight: 600; }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #10B981; color: white; }
        .badge-warning { background: #F59E0B; color: #0F172A; }
        .badge-danger { background: #EF4444; color: white; }
        .btn-icon {
            background: none;
            border: none;
            color: #94A3B8;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
        }
        .btn-icon:hover { background: #334155; color: white; }
        .btn-primary {
            background: #3B82F6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-danger {
            background: #EF4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }
        .btn-warning {
            background: #F59E0B;
            color: #0F172A;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1E293B;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 12px;
            color: white;
        }
        .spec-group {
            display: flex;
            gap: 8px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10B981;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            z-index: 1100;
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; }
            .menu-toggle {
                display: block;
                position: fixed;
                top: 16px;
                left: 16px;
                z-index: 101;
                background: #3B82F6;
                border: none;
                color: white;
                padding: 12px;
                border-radius: 12px;
                cursor: pointer;
            }
        }
        .menu-toggle { display: none; }
        .empty-state { text-align: center; padding: 40px; color: #64748B; }
        .product-img-small { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .banned-row { opacity: 0.5; background: #450a0a; }
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {
            padding: 8px 12px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 12px;
            color: white;
        }
    </style>
</head>
<body>

<button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

<div class="sidebar" id="sidebar">
    <h2>Sim<span>Admin PRO</span></h2>
    <div class="nav-item active" data-tab="dashboard">
        <i class="fas fa-chart-line"></i> <span>Дашборд</span>
    </div>
    <div class="nav-item" data-tab="products">
        <i class="fas fa-box"></i> <span>Товары</span>
    </div>
    <div class="nav-item" data-tab="users">
        <i class="fas fa-users"></i> <span>Клиенты</span>
    </div>
    <div class="nav-item" data-tab="orders">
        <i class="fas fa-shopping-cart"></i> <span>Заказы</span>
    </div>
    <div class="nav-item" data-tab="reviews">
        <i class="fas fa-star"></i> <span>Отзывы</span>
    </div>
    <div class="nav-item" data-tab="settings">
        <i class="fas fa-cog"></i> <span>Настройки</span>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="page-header">
        <h1 id="pageTitle">Панель управления</h1>
        <button class="btn-primary" id="actionBtn" style="display:none;">+ Добавить товар</button>
    </div>
    <div id="contentArea"></div>
</div>

<!-- Product Modal -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Товар</h3>
        <input type="text" id="prodName" placeholder="Название">
        <input type="number" id="prodPrice" placeholder="Цена">
        <input type="number" id="prodOldPrice" placeholder="Старая цена">
        <input type="text" id="prodImage" placeholder="URL фото">
        <select id="prodCategory">
            <option>Смартфоны</option><option>Наушники</option><option>Зарядки</option><option>Power Bank</option><option>Гаджеты</option>
        </select>
        <input type="text" id="prodBrand" placeholder="Бренд">
        <div id="specsContainer"></div>
        <button id="addSpecBtn" style="background:#334155; margin:8px 0;">+ Характеристика</button>
        <button id="saveProductBtn" class="btn-primary">Сохранить</button>
        <button id="closeModal" class="btn-danger" style="margin-top:8px;">Отмена</button>
    </div>
</div>

<!-- Ban Modal -->
<div id="banModal" class="modal">
    <div class="modal-content">
        <h3>⚠️ Блокировка клиента</h3>
        <p id="banUserName"></p>
        <button id="ban24hBtn" class="btn-warning" style="margin:8px 0;">🚫 Бан на 24 часа</button>
        <button id="banForeverBtn" class="btn-danger">🔒 Бан навсегда</button>
        <button id="unbanBtn" class="btn-primary" style="margin:8px 0;">✅ Снять бан</button>
        <button id="closeBanModal" class="btn-secondary" style="margin-top:8px;">Отмена</button>
    </div>
</div>

<script>
    // ========== INITIAL DEMO DATA ==========
    let products = JSON.parse(localStorage.getItem('sim_products')) || [
        { id: 1, name: "iPhone 15 Pro", price: 99990, oldPrice: 109990, image: "https://images.pexels.com/photos/699122/pexels-photo-699122.jpeg?w=200&h=150&fit=crop", category: "Смартфоны", brand: "Apple", specs: [{key:"Экран",value:"6.1″"},{key:"Память",value:"256GB"}] },
        { id: 2, name: "Samsung Galaxy S24", price: 89990, oldPrice: null, image: "https://images.pexels.com/photos/404280/pexels-photo-404280.jpeg?w=200&h=150&fit=crop", category: "Смартфоны", brand: "Samsung", specs: [] },
        { id: 3, name: "Xiaomi Redmi Note 13", price: 18990, oldPrice: 24990, image: "https://images.pexels.com/photos/47261/pexels-photo-47261.jpeg?w=200&h=150&fit=crop", category: "Смартфоны", brand: "Xiaomi", specs: [] },
        { id: 4, name: "JBL Tune 510BT", price: 3990, oldPrice: 5990, image: "https://images.pexels.com/photos/3394659/pexels-photo-3394659.jpeg?w=200&h=150&fit=crop", category: "Наушники", brand: "JBL", specs: [] }
    ];
    
    let users = JSON.parse(localStorage.getItem('sim_users')) || [
        { id: 1, name: "Алексей Иванов", phone: "+7 999 123-45-67", createdAt: Date.now() - 86400000 },
        { id: 2, name: "Мария Петрова", phone: "+7 999 234-56-78", createdAt: Date.now() - 172800000 },
        { id: 3, name: "Дмитрий Сидоров", phone: "+7 999 345-67-89", createdAt: Date.now() - 259200000 }
    ];
    
    let orders = JSON.parse(localStorage.getItem('sim_orders')) || [
        { id: 1001, userId: 1, customerName: "Алексей Иванов", customerPhone: "+7 999 123-45-67", address: "Москва, ул. Тверская 1", total: 99990, status: "Новый", items: [{name:"iPhone 15 Pro",qty:1}], createdAt: Date.now() - 3600000 },
        { id: 1002, userId: 2, customerName: "Мария Петрова", customerPhone: "+7 999 234-56-78", address: "СПб, Невский пр. 10", total: 18990, status: "В обработке", items: [{name:"Xiaomi Redmi Note 13",qty:1}], createdAt: Date.now() - 86400000 }
    ];
    
    let reviews = JSON.parse(localStorage.getItem('sim_reviews')) || {
        1: [{ userName: "Алексей", rating: 5, text: "Отличный телефон! Быстрая доставка", photos: [], date: "15.04.2026" }],
        2: [{ userName: "Мария", rating: 4, text: "Хороший смартфон, но дороговато", photos: [], date: "14.04.2026" }]
    };
    
    let bannedUsers = JSON.parse(localStorage.getItem('sim_banned')) || [];

    let currentTab = 'dashboard';
    let currentEditProductId = null;
    let currentBanUser = null;

    function saveAll() {
        localStorage.setItem('sim_products', JSON.stringify(products));
        localStorage.setItem('sim_users', JSON.stringify(users));
        localStorage.setItem('sim_orders', JSON.stringify(orders));
        localStorage.setItem('sim_reviews', JSON.stringify(reviews));
        localStorage.setItem('sim_banned', JSON.stringify(bannedUsers));
    }

    function isUserBanned(userId) {
        let ban = bannedUsers.find(b => b.userId === userId);
        if(!ban) return false;
        if(ban.permanent) return true;
        if(ban.until && Date.now() > ban.until) {
            bannedUsers = bannedUsers.filter(b => b.userId !== userId);
            saveAll();
            return false;
        }
        return true;
    }

    function getBanInfo(userId) {
        return bannedUsers.find(b => b.userId === userId);
    }

    function banUser(userId, hours = null) {
        let user = users.find(u => u.id === userId);
        if(!user) return;
        bannedUsers = bannedUsers.filter(b => b.userId !== userId);
        if(hours === null) {
            bannedUsers.push({ userId, reason: "Навсегда заблокирован", permanent: true });
        } else {
            bannedUsers.push({ userId, reason: `Блокировка на ${hours} часов`, until: Date.now() + (hours * 60 * 60 * 1000), permanent: false });
        }
        saveAll();
        showToast(`🔒 Пользователь ${user.name} заблокирован`);
        renderUsers();
    }

    function unbanUser(userId) {
        bannedUsers = bannedUsers.filter(b => b.userId !== userId);
        saveAll();
        let user = users.find(u => u.id === userId);
        showToast(`✅ Блокировка снята с ${user?.name || 'пользователя'}`);
        renderUsers();
    }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // ========== DASHBOARD ==========
    function renderDashboard() {
        document.getElementById('actionBtn').style.display = 'none';
        let totalProducts = products.length;
        let totalUsers = users.length;
        let totalOrders = orders.length;
        let totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
        let pendingOrders = orders.filter(o => o.status === 'Новый').length;
        let bannedCount = bannedUsers.length;

        document.getElementById('contentArea').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><div class="info"><h3>${totalProducts}</h3><p>Товаров</p></div><i class="fas fa-box"></i></div>
                <div class="stat-card"><div class="info"><h3>${totalUsers}</h3><p>Клиентов</p></div><i class="fas fa-users"></i></div>
                <div class="stat-card"><div class="info"><h3>${bannedCount}</h3><p>Заблокировано</p></div><i class="fas fa-gavel"></i></div>
                <div class="stat-card"><div class="info"><h3>${totalOrders}</h3><p>Заказов</p></div><i class="fas fa-shopping-cart"></i></div>
                <div class="stat-card"><div class="info"><h3>${totalRevenue.toLocaleString()} ₽</h3><p>Выручка</p></div><i class="fas fa-rouble"></i></div>
                <div class="stat-card"><div class="info"><h3>${pendingOrders}</h3><p>Новых заказов</p></div><i class="fas fa-clock"></i></div>
            </div>
            <div class="table-container">
                <h3 style="margin-bottom:16px;">📦 Последние заказы</h3>
                <table>
                    <thead><tr><th>ID</th><th>Клиент</th><th>Сумма</th><th>Статус</th><th></th></tr></thead>
                    <tbody>
                        ${orders.slice(0,5).map(o => `<tr><td>#${o.id}</td><td>${o.customerName}</td><td>${o.total.toLocaleString()} ₽</td><td><span class="badge ${o.status === 'Новый' ? 'badge-warning' : 'badge-success'}">${o.status}</span></td><td><button class="btn-icon" onclick="viewOrder(${o.id})"><i class="fas fa-eye"></i></button></td></tr>`).join('')}
                        ${orders.length === 0 ? '<tr><td colspan="5" class="empty-state">Нет заказов</td></tr>' : ''}
                    </tbody>
                </table>
            </div>
        `;
    }

    // ========== PRODUCTS ==========
    function renderProducts() {
        document.getElementById('actionBtn').style.display = 'block';
        document.getElementById('actionBtn').innerHTML = '+ Добавить товар';
        document.getElementById('actionBtn').onclick = () => openProductModal();
        
        document.getElementById('contentArea').innerHTML = `
            <div class="filter-bar">
                <input type="text" id="searchProduct" placeholder="🔍 Поиск товара..." onkeyup="filterProducts()">
                <select id="categoryFilter" onchange="filterProducts()">
                    <option value="">Все категории</option>
                    <option>Смартфоны</option><option>Наушники</option><option>Зарядки</option><option>Power Bank</option><option>Гаджеты</option>
                </select>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Фото</th><th>Название</th><th>Цена</th><th>Категория</th><th>Бренд</th><th>Действия</th></tr></thead>
                    <tbody id="productsTableBody"></tbody>
                </table>
            </div>
        `;
        filterProducts();
    }

    function filterProducts() {
        let search = document.getElementById('searchProduct')?.value.toLowerCase() || '';
        let category = document.getElementById('categoryFilter')?.value || '';
        let filtered = products.filter(p => {
            let matchSearch = p.name.toLowerCase().includes(search);
            let matchCategory = !category || p.category === category;
            return matchSearch && matchCategory;
        });
        document.getElementById('productsTableBody').innerHTML = filtered.map(p => `
            <tr>
                <td><img src="${p.image}" class="product-img-small" onerror="this.src='https://placehold.co/50x50'"></td>
                <td>${p.name}</td>
                <td><input type="number" value="${p.price}" id="price_${p.id}" style="width:100px; background:#334155; border:1px solid #475569; border-radius:8px; padding:4px;"> ₽</td>
                <td>${p.category}</td>
                <td><input type="text" value="${p.brand}" id="brand_${p.id}" style="background:#334155; border:1px solid #475569; border-radius:8px; padding:4px;"></td>
                <td>
                    <button class="btn-icon" onclick="updateProduct(${p.id})" title="Сохранить цену/бренд"><i class="fas fa-save"></i></button>
                    <button class="btn-icon" onclick="editProduct(${p.id})" title="Редактировать"><i class="fas fa-edit"></i></button>
                    <button class="btn-icon" onclick="changeProductImage(${p.id})" title="Сменить фото"><i class="fas fa-image"></i></button>
                    <button class="btn-icon" onclick="deleteProduct(${p.id})" title="Удалить"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
        if(filtered.length === 0) document.getElementById('productsTableBody').innerHTML = '<tr><td colspan="6" class="empty-state">Нет товаров</td></tr>';
    }

    function updateProduct(id) {
        let newPrice = parseInt(document.getElementById(`price_${id}`).value);
        let newBrand = document.getElementById(`brand_${id}`).value;
        let product = products.find(p => p.id === id);
        if(product) {
            product.price = newPrice;
            product.brand = newBrand;
            saveAll();
            showToast("✅ Цена и бренд обновлены");
        }
    }

    function changeProductImage(id) {
        let newUrl = prompt("Введите новый URL фото:");
        if(newUrl) {
            let product = products.find(p => p.id === id);
            if(product) { product.image = newUrl; saveAll(); showToast("✅ Фото обновлено"); filterProducts(); }
        }
    }

    function openProductModal(product = null) {
        document.getElementById('productModal').style.display = 'flex';
        if(product) {
            currentEditProductId = product.id;
            document.getElementById('modalTitle').innerText = 'Редактировать товар';
            document.getElementById('prodName').value = product.name;
            document.getElementById('prodPrice').value = product.price;
            document.getElementById('prodOldPrice').value = product.oldPrice || '';
            document.getElementById('prodImage').value = product.image;
            document.getElementById('prodCategory').value = product.category;
            document.getElementById('prodBrand').value = product.brand;
            let specsHtml = '';
            if(product.specs) product.specs.forEach((s,i) => { specsHtml += `<div class="spec-group"><input value="${s.key}" placeholder="Характеристика"><input value="${s.value}" placeholder="Значение"><button onclick="this.parentElement.remove()">✖</button></div>`; });
            document.getElementById('specsContainer').innerHTML = specsHtml || '<div class="spec-group"><input placeholder="Характеристика"><input placeholder="Значение"><button onclick="this.parentElement.remove()">✖</button></div>';
        } else {
            currentEditProductId = null;
            document.getElementById('modalTitle').innerText = 'Новый товар';
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodOldPrice').value = '';
            document.getElementById('prodImage').value = '';
            document.getElementById('prodBrand').value = '';
            document.getElementById('specsContainer').innerHTML = '<div class="spec-group"><input placeholder="Характеристика"><input placeholder="Значение"><button onclick="this.parentElement.remove()">✖</button></div>';
        }
    }

    function saveProduct() {
        let name = document.getElementById('prodName').value;
        let price = parseFloat(document.getElementById('prodPrice').value);
        let oldPrice = parseFloat(document.getElementById('prodOldPrice').value) || null;
        let image = document.getElementById('prodImage').value;
        let category = document.getElementById('prodCategory').value;
        let brand = document.getElementById('prodBrand').value;
        if(!name || !price || !image || !brand) { showToast("Заполните все поля"); return; }
        let specs = [];
        document.querySelectorAll('#specsContainer .spec-group').forEach(g => {
            let inputs = g.querySelectorAll('input');
            if(inputs[0].value && inputs[1].value) specs.push({ key: inputs[0].value, value: inputs[1].value });
        });
        if(currentEditProductId) {
            let index = products.findIndex(p => p.id === currentEditProductId);
            if(index !== -1) products[index] = { ...products[index], name, price, oldPrice, image, category, brand, specs };
        } else {
            products.push({ id: Date.now(), name, price, oldPrice, image, category, brand, specs });
        }
        saveAll();
        document.getElementById('productModal').style.display = 'none';
        renderProducts();
        showToast("✅ Товар сохранён");
    }

    function editProduct(id) { openProductModal(products.find(p => p.id === id)); }
    function deleteProduct(id) { if(confirm("Удалить товар навсегда?")) { products = products.filter(p => p.id !== id); saveAll(); renderProducts(); showToast("Товар удалён"); } }

    // ========== USERS ==========
    function renderUsers() {
        document.getElementById('actionBtn').style.display = 'none';
        document.getElementById('contentArea').innerHTML = `
            <div class="filter-bar">
                <input type="text" id="searchUser" placeholder="🔍 Поиск по имени или телефону..." onkeyup="filterUsers()">
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>ID</th><th>Имя</th><th>Телефон</th><th>Статус</th><th>Дата регистрации</th><th>Действия</th></tr></thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        `;
        filterUsers();
    }

    function filterUsers() {
        let search = document.getElementById('searchUser')?.value.toLowerCase() || '';
        let filtered = users.filter(u => u.name.toLowerCase().includes(search) || u.phone.includes(search));
        document.getElementById('usersTableBody').innerHTML = filtered.map(u => {
            let ban = getBanInfo(u.id);
            let status = '';
            let statusClass = '';
            if(ban) {
                if(ban.permanent) { status = '🔒 Забанен навсегда'; statusClass = 'badge-danger'; }
                else { status = `⏳ Забанен до ${new Date(ban.until).toLocaleString()}`; statusClass = 'badge-warning'; }
            } else { status = '✅ Активен'; statusClass = 'badge-success'; }
            return `<tr class="${ban ? 'banned-row' : ''}">
                <td>#${u.id}</td><td>${u.name}</td><td>${u.phone}</td>
                <td><span class="badge ${statusClass}">${status}</span></td>
                <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                <td>
                    <button class="btn-icon" onclick="openBanModal(${u.id}, '${u.name}')" title="Блокировка"><i class="fas fa-gavel"></i></button>
                    <button class="btn-icon" onclick="deleteUser(${u.id})" title="Удалить"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        }).join('');
        if(filtered.length === 0) document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="6" class="empty-state">Нет пользователей</td></tr>';
    }

    function openBanModal(userId, userName) {
        currentBanUser = userId;
        document.getElementById('banUserName').innerHTML = `Пользователь: ${userName}`;
        document.getElementById('banModal').style.display = 'flex';
    }

    function deleteUser(id) { if(confirm("Удалить клиента навсегда?")) { users = users.filter(u => u.id !== id); bannedUsers = bannedUsers.filter(b => b.userId !== id); saveAll(); renderUsers(); showToast("Клиент удалён"); } }

    // ========== ORDERS ==========
    function renderOrders() {
        document.getElementById('actionBtn').style.display = 'none';
        document.getElementById('contentArea').innerHTML = `
            <div class="filter-bar">
                <select id="statusFilter" onchange="filterOrders()">
                    <option value="">Все статусы</option>
                    <option>Новый</option><option>В обработке</option><option>Доставлен</option><option>Завершён</option>
                </select>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>ID</th><th>Клиент</th><th>Телефон</th><th>Сумма</th><th>Статус</th><th>Действия</th></tr></thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        `;
        filterOrders();
    }

    function filterOrders() {
        let status = document.getElementById('statusFilter')?.value || '';
        let filtered = status ? orders.filter(o => o.status === status) : orders;
        document.getElementById('ordersTableBody').innerHTML = filtered.map(o => `
            <tr>
                <td>#${o.id}</td><td>${o.customerName}</td><td>${o.customerPhone}</td>
                <td>${o.total.toLocaleString()} ₽</td>
                <td><select onchange="updateOrderStatus(${o.id}, this.value)" style="background:#334155; border:1px solid #475569; border-radius:12px; padding:4px 8px; color:white;">${['Новый','В обработке','Доставлен','Завершён'].map(s => `<option ${o.status===s ? 'selected' : ''}>${s}</option>`).join('')}</select></td>
                <td><button class="btn-icon" onclick="viewOrder(${o.id})"><i class="fas fa-eye"></i></button> <button class="btn-icon" onclick="deleteOrder(${o.id})"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
        if(filtered.length === 0) document.getElementById('ordersTableBody').innerHTML = '<tr><td colspan="6" class="empty-state">Нет заказов</td></tr>';
    }

    function viewOrder(id) { let o = orders.find(o => o.id === id); if(o) alert(`📦 ЗАКАЗ #${o.id}\n\nКлиент: ${o.customerName}\nТелефон: ${o.customerPhone}\nАдрес: ${o.address}\nТовары: ${o.items?.map(i => `${i.name} x${i.qty}`).join(', ')}\nСумма: ${o.total.toLocaleString()} ₽\nСтатус: ${o.status}\nДата: ${new Date(o.createdAt).toLocaleString()}`); }
    function updateOrderStatus(id, status) { let order = orders.find(o => o.id === id); if(order) { order.status = status; saveAll(); filterOrders(); showToast("Статус обновлён"); } }
    function deleteOrder(id) { if(confirm("Удалить заказ?")) { orders = orders.filter(o => o.id !== id); saveAll(); renderOrders(); showToast("Заказ удалён"); } }

    // ========== REVIEWS ==========
    function renderReviews() {
        document.getElementById('actionBtn').style.display = 'none';
        let allReviews = [];
        for(let productId in reviews) {
            reviews[productId].forEach((r, idx) => {
                let product = products.find(p => p.id == productId);
                allReviews.push({ ...r, productId, reviewIdx: idx, productName: product?.name || 'Товар удалён' });
            });
        }
        document.getElementById('contentArea').innerHTML = `
            <div class="table-container">
                <table>
                    <thead><tr><th>Товар</th><th>Пользователь</th><th>Рейтинг</th><th>Отзыв</th><th>Дата</th><th>Действия</th></tr></thead>
                    <tbody>
                        ${allReviews.map(r => `<tr><td>${r.productName}</td><td>${r.userName}</td><td>${'★'.repeat(r.rating)}</td><td>${r.text.substring(0,50)}...</td><td>${r.date}</td>}<button class="btn-icon" onclick="deleteReview('${r.productId}', ${r.reviewIdx})"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
                        ${allReviews.length === 0 ? '<tr><td colspan="6" class="empty-state">Нет отзывов</td>' : ''}
                    </tbody>
                </table>
            </div>
        `;
    }

    function deleteReview(productId, idx) { if(confirm("Удалить отзыв?")) { reviews[productId].splice(idx,1); if(reviews[productId].length === 0) delete reviews[productId]; saveAll(); renderReviews(); showToast("Отзыв удалён"); } }

    // ========== SETTINGS ==========
    function renderSettings() {
        document.getElementById('actionBtn').style.display = 'none';
        document.getElementById('contentArea').innerHTML = `
            <div class="table-container">
                <h3>⚙️ Глобальные настройки</h3>
                <div style="margin:20px 0;"><button class="btn-danger" onclick="clearAllData()">🗑️ Очистить ВСЕ данные</button> <span style="margin-left:12px; color:#94A3B8;">Удалить товары, клиентов, заказы, отзывы, баны</span></div>
                <div><button class="btn-primary" onclick="exportData()">📥 Экспорт данных (JSON)</button> <button class="btn-primary" onclick="importData()" style="margin-left:12px;">📤 Импорт данных</button><input type="file" id="importFile" style="display:none;" accept=".json"></div>
                <div style="margin-top:20px;"><button class="btn-warning" onclick="resetToDefault()">🔄 Сбросить до демо-данных</button></div>
            </div>
        `;
    }

    function clearAllData() { if(confirm("ПОЛНОСТЬЮ ОЧИСТИТЬ ВСЕ ДАННЫЕ?")) { products = []; users = []; orders = []; reviews = {}; bannedUsers = []; saveAll(); renderDashboard(); showToast("Все данные очищены"); } }
    function exportData() { let data = { products, users, orders, reviews, bannedUsers }; let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)])); a.download = 'simmarket_backup.json'; a.click(); }
    function importData() { document.getElementById('importFile').click(); document.getElementById('importFile').onchange = (e) => { let file = e.target.files[0]; let reader = new FileReader(); reader.onload = (ev) => { let data = JSON.parse(ev.target.result); if(data.products) products = data.products; if(data.users) users = data.users; if(data.orders) orders = data.orders; if(data.reviews) reviews = data.reviews; if(data.bannedUsers) bannedUsers = data.bannedUsers; saveAll(); showToast("Данные импортированы"); renderDashboard(); }; reader.readAsText(file); }; }
    function resetToDefault() { if(confirm("Сбросить все данные до демо-версии?")) { location.reload(); } }

    // ========== NAVIGATION ==========
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');
        let titles = { dashboard:'Панель управления', products:'Управление товарами', users:'Управление клиентами', orders:'Управление заказами', reviews:'Управление отзывами', settings:'Настройки' };
        document.getElementById('pageTitle').innerText = titles[tab];
        if(tab === 'dashboard') renderDashboard();
        else if(tab === 'products') renderProducts();
        else if(tab === 'users') renderUsers();
        else if(tab === 'orders') renderOrders();
        else if(tab === 'reviews') renderReviews();
        else if(tab === 'settings') renderSettings();
    }

    // Global functions for inline calls
    window.updateProduct = updateProduct;
    window.editProduct = editProduct;
    window.changeProductImage = changeProductImage;
    window.deleteProduct = deleteProduct;
    window.filterProducts = filterProducts;
    window.filterUsers = filterUsers;
    window.filterOrders = filterOrders;
    window.openBanModal = openBanModal;
    window.deleteUser = deleteUser;
    window.viewOrder = viewOrder;
    window.updateOrderStatus = updateOrderStatus;
    window.deleteOrder = deleteOrder;
    window.deleteReview = deleteReview;
    window.clearAllData = clearAllData;
    window.exportData = exportData;
    window.importData = importData;
    window.resetToDefault = resetToDefault;

    document.querySelectorAll('.nav-item').forEach(item => { item.onclick = () => switchTab(item.dataset.tab); });
    document.getElementById('menuToggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('addSpecBtn').onclick = () => { let div = document.createElement('div'); div.className = 'spec-group'; div.innerHTML = '<input placeholder="Характеристика"><input placeholder="Значение"><button onclick="this.parentElement.remove()">✖</button>'; document.getElementById('specsContainer').appendChild(div); };
    document.getElementById('saveProductBtn').onclick = saveProduct;
    document.getElementById('closeModal').onclick = () => document.getElementById('productModal').style.display = 'none';
    document.getElementById('ban24hBtn').onclick = () => { if(currentBanUser) banUser(currentBanUser, 24); document.getElementById('banModal').style.display = 'none'; };
    document.getElementById('banForeverBtn').onclick = () => { if(currentBanUser) banUser(currentBanUser, null); document.getElementById('banModal').style.display = 'none'; };
    document.getElementById('unbanBtn').onclick = () => { if(currentBanUser) unbanUser(currentBanUser); document.getElementById('banModal').style.display = 'none'; };
    document.getElementById('closeBanModal').onclick = () => { document.getElementById('banModal').style.display = 'none'; };

    switchTab('dashboard');
    saveAll();
</script>
</body>
</html>
