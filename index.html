<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM ADMIN | CONTROL PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background: #050505; color: #fff; min-height: 100vh; }
        .gold-text { color: #bf953f; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select { background: #111 !important; border: 1px solid #222 !important; color: #fff !important; outline: none; }
        .tab-btn { padding: 12px 24px; cursor: pointer; opacity: 0.4; transition: 0.3s; border-bottom: 2px solid transparent; text-transform: uppercase; font-size: 11px; font-weight: 800; }
        .tab-btn.active { opacity: 1; border-color: #bf953f; color: #bf953f; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; font-size: 10px; text-transform: uppercase; opacity: 0.3; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }
        .btn-del { color: #ff4444; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-black italic uppercase">SIM <span class="gold-text">ADMIN</span></h1>
                <p class="text-[9px] opacity-30 uppercase tracking-[3px]">Управление базой Hasavyurt</p>
            </div>
            <div class="flex gap-4">
                <button onclick="location.reload()" class="glass px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Обновить</button>
            </div>
        </header>

        <div class="flex border-b border-white/5 mb-8">
            <div id="t-nums" class="tab-btn active" onclick="showSec('nums')">Номера</div>
            <div id="t-orders" class="tab-btn" onclick="showSec('orders')">Заявки</div>
            <div id="t-users" class="tab-btn" onclick="showSec('users')">Клиенты</div>
        </div>

        <section id="s-nums" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 glass p-6 rounded-[30px]">
                <input type="text" id="in-num" placeholder="999 000 77 77" class="p-4 rounded-2xl">
                <input type="number" id="in-price" placeholder="Цена" class="p-4 rounded-2xl">
                <select id="in-op" class="p-4 rounded-2xl">
                    <option value="МТС">МТС</option>
                    <option value="БИЛАЙН">Билайн</option>
                    <option value="МЕГАФОН">Мегафон</option>
                </select>
                <button onclick="addNum()" class="bg-[#bf953f] text-black font-black uppercase text-xs rounded-2xl py-4">Добавить номер</button>
            </div>

            <div class="glass rounded-[30px] overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>Номер</th>
                            <th>Оператор</th>
                            <th>Цена</th>
                            <th class="text-right">Управление</th>
                        </tr>
                    </thead>
                    <tbody id="list-nums"></tbody>
                </table>
            </div>
        </section>

        <section id="s-orders" class="hidden">
            <div class="glass rounded-[30px] overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Клиент (Имя)</th>
                            <th>Телефон клиента</th>
                            <th>Выбранный номер</th>
                            <th class="text-right">Действие</th>
                        </tr>
                    </thead>
                    <tbody id="list-orders"></tbody>
                </table>
            </div>
        </section>

        <section id="s-users" class="hidden">
            <div class="glass rounded-[30px] overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>Телефон</th>
                            <th>Пароль</th>
                            <th class="text-right">Статус</th>
                        </tr>
                    </thead>
                    <tbody id="list-users"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const conf = { 
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(conf);
        const db = firebase.database();

        function showSec(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById('s-' + id).classList.remove('hidden');
            document.getElementById('t-' + id).classList.add('active');
        }

        // --- НОМЕРА ---
        function addNum() {
            const num = document.getElementById('in-num').value;
            const price = document.getElementById('in-price').value;
            const op = document.getElementById('in-op').value;
            if(!num || !price) return alert("Заполни все поля!");
            
            const id = Date.now();
            db.ref('inventory/' + id).set({ id, num, price, op })
            .then(() => {
                alert("Номер добавлен!");
                document.getElementById('in-num').value = "";
                document.getElementById('in-price').value = "";
            });
        }

        function delNum(id) { if(confirm("Удалить номер?")) db.ref('inventory/' + id).remove(); }

        db.ref('inventory').on('value', snap => {
            const container = document.getElementById('list-nums');
            container.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                const i = data[id];
                container.innerHTML += `
                    <tr>
                        <td class="font-bold italic text-lg">+7 ${i.num}</td>
                        <td><span class="bg-white/5 px-3 py-1 rounded-full text-[10px] font-black">${i.op}</span></td>
                        <td class="gold-text font-black">${i.price} ₽</td>
                        <td class="text-right"><button onclick="delNum('${id}')" class="btn-del">Удалить</button></td>
                    </tr>`;
            }
        });

        // --- ЗАЯВКИ (ОБЛАКО) ---
        function delOrder(id) { if(confirm("Удалить заявку?")) db.ref('orders/' + id).remove(); }

        db.ref('orders').on('value', snap => {
            const container = document.getElementById('list-orders');
            container.innerHTML = "";
            const data = snap.val();
            if(!data) { container.innerHTML = "<tr><td colspan='5' class='p-10 text-center opacity-20'>Заявок пока нет</td></tr>"; return; }
            for(let id in data) {
                const o = data[id];
                container.innerHTML += `
                    <tr>
                        <td class="opacity-40 text-[10px]">${new Date(o.date).toLocaleString()}</td>
                        <td class="font-bold">${o.clientName}</td>
                        <td class="gold-text">${o.clientPhone}</td>
                        <td class="italic font-black">+7 ${o.wantedNum}</td>
                        <td class="text-right"><button onclick="delOrder('${id}')" class="btn-del">Выполнено</button></td>
                    </tr>`;
            }
        });

        // --- КЛИЕНТЫ (ОБЛАКО) ---
        db.ref('users').on('value', snap => {
            const container = document.getElementById('list-users');
            container.innerHTML = "";
            const data = snap.val();
            for(let ph in data) {
                container.innerHTML += `
                    <tr>
                        <td class="font-bold text-lg">+7 ${ph}</td>
                        <td class="opacity-50">${data[ph].pass}</td>
                        <td class="text-right text-[10px] font-black text-green-500 uppercase tracking-widest">Active</td>
                    </tr>`;
            }
        });
    </script>
</body>
</html>
