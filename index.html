    <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET CONTROL v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .gold-text { color: #bf953f; }
        .btn-gold { background: linear-gradient(90deg, #bf953f, #aa8332); color: #000; font-weight: bold; border-radius: 12px; }
        .card { background: #0a0a0a; border: 1px solid #222; border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>
    <div id="gate" class="fixed inset-0 bg-black flex items-center justify-center p-6 z-[999]">
        <div class="text-center w-full max-w-xs">
            <h1 class="text-2xl font-black gold-text mb-6 italic">SIM CONTROL</h1>
            <input type="password" id="pass" placeholder="Код 7777" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-center mb-4">
            <button onclick="login()" class="btn-gold w-full py-4 uppercase">Вход</button>
        </div>
    </div>

    <div id="main" class="hidden p-6 pb-24">
        <header class="mb-8">
            <h2 class="text-xl font-black gold-text">MARKET CONTROL</h2>
            <p class="text-[10px] opacity-30 tracking-widest uppercase">Система активна</p>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="card border-l-4 border-amber-500">
                <p class="text-[10px] opacity-40 uppercase mb-1">Заявок</p>
                <p id="st-leads" class="text-3xl font-black">0</p>
            </div>
            <div class="card border-l-4 border-white/10">
                <p class="text-[10px] opacity-40 uppercase mb-1">Товар</p>
                <p id="st-total" class="text-3xl font-black">0</p>
            </div>
        </div>

        <div id="leads-list" class="space-y-3">
            <p class="text-center opacity-20 py-10">Ожидание заявок...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44",
            authDomain: "nnnmb-a0b52.firebaseapp.com",
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com",
            projectId: "nnnmb-a0b52"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function login() {
            if(document.getElementById('pass').value === "7777") {
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('main').classList.remove('hidden');
                startSync();
            }
        }

        function startSync() {
            db.ref('leads').on('value', s => {
                const data = s.val() || {};
                const list = document.getElementById('leads-list');
                const count = Object.keys(data).length;
                document.getElementById('st-leads').innerText = count;
                
                list.innerHTML = count > 0 ? "" : '<p class="text-center opacity-20 py-10">Заявок нет</p>';
                Object.keys(data).reverse().forEach(k => {
                    list.innerHTML += `
                        <div class="card flex justify-between items-center animate-pulse">
                            <div>
                                <div class="text-amber-500 text-[10px] font-bold mb-1">НОВАЯ ЗАЯВКА</div>
                                <div class="text-xl font-black">${data[k].num}</div>
                            </div>
                            <button onclick="db.ref('leads/${k}').remove()" class="text-xs opacity-20">УДАЛИТЬ</button>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
