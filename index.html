<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-MARKET | ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        input, select { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; width: 100%; margin-top: 5px; outline: none; }
        button { background: #d4af37; color: #000; font-weight: bold; padding: 12px; border-radius: 10px; width: 100%; margin-top: 10px; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .delete-btn { background: #ff4444; color: white; padding: 5px 10px; border-radius: 5px; width: auto; font-size: 12px; }
    </style>
</head>
<body class="p-5 pb-20">

    <h1 class="text-2xl font-black text-[#d4af37] mb-6 italic text-center uppercase">Панель Управления</h1>

    <!-- БАННЕР -->
    <div class="card">
        <h2 class="text-[#d4af37] font-bold mb-3 uppercase text-sm italic">Настройка Баннера</h2>
        <input type="text" id="bTitle" placeholder="Заголовок (например: АКЦИЯ)">
        <input type="text" id="bSub" placeholder="Подзаголовок (например: Скидки 20%)">
        <button onclick="saveBanner()">Обновить баннер</button>
    </div>

    <!-- ДОБАВИТЬ НОМЕР -->
    <div class="card">
        <h2 class="text-[#d4af37] font-bold mb-3 uppercase text-sm italic">Добавить новый номер</h2>
        <input type="text" id="nNum" placeholder="Номер (например: 777 05 05)">
        <input type="text" id="nPrice" placeholder="Цена (например: 50 000)">
        <select id="nOp">
            <option value="МЕГАФОН">МЕГАФОН</option>
            <option value="БИЛАЙН">БИЛАЙН</option>
            <option value="МТС">МТС</option>
        </select>
        <button onclick="addNumber()">Опубликовать на сайт</button>
    </div>

    <!-- ЗАКАЗЫ -->
    <div class="card">
        <h2 class="text-[#d4af37] font-bold mb-3 uppercase text-sm italic">Новые заявки</h2>
        <div id="ordersList" class="space-y-3"></div>
    </div>

    <!-- ВСЕ НОМЕРА -->
    <div class="card">
        <h2 class="text-[#d4af37] font-bold mb-3 uppercase text-sm italic">Все номера на сайте</h2>
        <div id="inventoryList" class="space-y-2"></div>
    </div>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44",
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com"
        });
        const db = firebase.database();

        // Функции баннера
        function saveBanner() {
            const title = document.getElementById('bTitle').value;
            const sub = document.getElementById('bSub').value;
            db.ref('settings/banner').set({ title, sub }).then(() => alert('Баннер обновлен!'));
        }

        // Добавить номер
        function addNumber() {
            const num = document.getElementById('nNum').value;
            const price = document.getElementById('nPrice').value;
            const op = document.getElementById('nOp').value;
            if(!num || !price) return alert('Заполни поля!');
            
            db.ref('inventory').push({ num, price, op }).then(() => {
                alert('Номер добавлен!');
                document.getElementById('nNum').value = '';
                document.getElementById('nPrice').value = '';
            });
        }

        // Список номеров (с удалением)
        db.ref('inventory').on('value', s => {
            const cont = document.getElementById('inventoryList');
            cont.innerHTML = '';
            s.forEach(c => {
                const item = c.val();
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-[#222] p-3 rounded-lg border border-white/5">
                        <span class="text-sm font-bold">${item.num} (${item.price} ₽)</span>
                        <button class="delete-btn" onclick="deleteItem('inventory/${c.key}')">Удалить</button>
                    </div>`;
            });
        });

        // Список заказов
        db.ref('orders').on('value', s => {
            const cont = document.getElementById('ordersList');
            cont.innerHTML = '';
            s.forEach(c => {
                const o = c.val();
                cont.innerHTML += `
                    <div class="bg-white/5 p-4 rounded-xl border border-white/10">
                        <p class="text-xs text-gray-500 mb-1">${o.date || ''}</p>
                        <p class="font-bold text-[#d4af37]">КЛИЕНТ: ${o.name}</p>
                        <p class="text-sm text-white">ТЕЛ: ${o.phone}</p>
                        <p class="text-xs text-gray-400 mt-1 italic">Хочет номер: ${o.item}</p>
                        <button class="delete-btn mt-2 bg-gray-600" onclick="deleteItem('orders/${c.key}')">В архив</button>
                    </div>`;
            });
        });

        function deleteItem(path) {
            if(confirm('Точно удалить?')) db.ref(path).remove();
        }
    </script>
</body>
</html>
