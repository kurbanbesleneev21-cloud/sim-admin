<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIM ADMIN | NOTIFIER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background: #050505; color: #fff; margin: 0; padding-bottom: 80px; }
        .gold-text { background: linear-gradient(90deg, #bf953f, #fcf6ba, #bf953f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: #0d0d0d; border: 1px solid rgba(191,149,63,0.1); border-radius: 20px; padding: 15px; }
        .input-dark { background: #151515; border: 1px solid #222; border-radius: 12px; padding: 12px; width: 100%; color: #fff; outline: none; font-size: 13px; }
        .tab-btn { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #444; flex: 1; text-align: center; padding: 15px 0; border-bottom: 2px solid transparent; }
        .tab-active { color: #bf953f; border-color: #bf953f; background: rgba(191,149,63,0.05); }
        .btn-gold { background: #bf953f; color: #000; font-weight: 800; border-radius: 12px; padding: 12px; width: 100%; text-transform: uppercase; border: none; }
    </style>
</head>
<body>

    <div id="auth" class="fixed inset-0 bg-black z-[200] flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-xs">
            <h1 class="text-3xl font-black gold-text italic mb-6">SIM CONTROL</h1>
            <input type="password" id="pass" placeholder="ПИН-КОД" class="input-dark text-center mb-4 text-xl tracking-[10px]">
            <button onclick="login()" class="btn-gold">ВОЙТИ</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="p-6 bg-[#080808] border-b border-white/5 flex justify-between items-center">
            <div>
                <p class="text-[8px] opacity-30 uppercase tracking-widest mb-1">Admin Panel</p>
                <div class="flex gap-4">
                    <div class="text-emerald-500 font-black text-lg" id="stat-v">0 <span class="text-[9px] opacity-50">Визиты</span></div>
                    <div class="text-white font-black text-lg" id="stat-l">0 <span class="text-[9px] opacity-50">Заявки</span></div>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-white/5 p-2 rounded-lg text-sm">🔄</button>
        </header>

        <nav class="flex sticky top-0 bg-black/95 backdrop-blur-lg z-50 border-b border-white/5">
            <button onclick="showTab('leads')" id="btn-leads" class="tab-btn tab-active">Заявки</button>
            <button onclick="showTab('inv')" id="btn-inv" class="tab-btn">Склад</button>
            <button onclick="showTab('add')" id="btn-add" class="tab-btn">Добавить</button>
            <button onclick="showTab('chat')" id="btn-chat" class="tab-btn">Чат</button>
        </nav>

        <main class="p-4 space-y-4">
            <div id="tab-leads" class="space-y-3"><div id="list-leads"></div></div>
            
            <div id="tab-inv" class="hidden space-y-3">
                <input type="text" id="search" oninput="renderInv()" placeholder="Поиск номера..." class="input-dark">
                <div id="list-inv"></div>
            </div>

            <div id="tab-add" class="hidden card">
                <textarea id="new-nums" placeholder="Номера через пробел..." class="input-dark h-24 mb-3"></textarea>
                <input type="number" id="new-price" placeholder="Цена (₽)" class="input-dark mb-3">
                <select id="new-op" class="input-dark mb-4">
                    <option value="mts">МТС</option><option value="megafon">Мегафон</option><option value="beeline">Билайн</option><option value="tele2">Tele2</option>
                </select>
                <button onclick="addNumbers()" class="btn-gold">Добавить на склад</button>
            </div>

            <div id="tab-chat" class="hidden space-y-3">
                <div id="chat-list" class="space-y-2"></div>
                <div id="chat-box" class="card h-[400px] flex flex-col hidden border-[#bf953f]/30">
                    <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-2 text-xs mb-3 flex flex-col p-2"></div>
                    <div class="flex gap-2 p-1">
                        <input type="text" id="chat-in" class="input-dark flex-1" placeholder="Ответ...">
                        <button onclick="sendAdminMsg()" class="btn-gold !w-14">></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ТВОИ ДАННЫЕ TELEGRAM
        const TG_TOKEN = "8569235049:AAEsaW4ME-Ql6036i04tIbj--IPNT6JdroE"; 
        const TG_ID = "8768514374";

        const cfg = { 
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
            authDomain: "nnnmb-a0b52.firebaseapp.com", 
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com", 
            projectId: "nnnmb-a0b52" 
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();

        let allStock = {};
        let currentChatId = '';
        let initialLoad = true; // Чтобы не слать старые заявки при открытии

        function sendTG(text) {
            const msg = encodeURIComponent(text);
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_ID}&text=${msg}&parse_mode=HTML`);
        }

        function login() {
            if(document.getElementById('pass').value === '7777') {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                init();
            } else { alert("Неверный код!"); }
        }

        function showTab(t) {
            ['leads','inv','add','chat'].forEach(x => {
                document.getElementById('tab-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('tab-active');
            });
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('tab-active');
        }

        function init() {
            // Слушаем новые ЗАЯВКИ
            db.ref('leads').on('child_added', s => {
                const l = s.val();
                if(!initialLoad) {
                    sendTG(`🚀 <b>НОВАЯ ЗАЯВКА!</b>\n📱 Номер: +7 ${l.num}\n👤 Клиент: ${l.fio}\n📞 Контакт: ${l.contact}`);
                }
                renderLeads();
            });

            // Слушаем новые СООБЩЕНИЯ В ЧАТАХ
            db.ref('chats').on('child_changed', s => {
                const data = s.val();
                const chatId = s.key;
                const lastMsg = data.metadata?.lastMsg || "";
                // Уведомляем, если последнее сообщение НЕ от админа
                if(!lastMsg.startsWith("Админ:")) {
                    sendTG(`💬 <b>НОВОЕ СООБЩЕНИЕ</b>\n🆔 ID: ${chatId}\n✉️ Текст: ${lastMsg}`);
                }
            });

            // Обычные функции отрисовки
            db.ref('leads').on('value', s => { renderLeads(s.val()); });
            db.ref('inventory').on('value', s => { allStock = s.val() || {}; renderInv(); });
            db.ref('chats').on('value', s => { renderChatList(s.val() || {}); });
            db.ref('stats/visits').on('value', s => { document.getElementById('stat-v').innerText = s.val() || 0; });
            
            // После первой загрузки включаем уведомления
            setTimeout(() => { initialLoad = false; }, 2000);
        }

        function renderLeads(leads) {
            const list = document.getElementById('list-leads');
            list.innerHTML = "";
            const data = leads || {};
            document.getElementById('stat-l').innerText = Object.keys(data).length;
            Object.keys(data).reverse().forEach(id => {
                const l = data[id];
                list.innerHTML += `<div class="card mb-2 border-l-4 border-yellow-600">
                    <div class="flex justify-between"><b>+7 ${l.num}</b><button onclick="db.ref('leads/${id}').remove()" class="text-red-500 text-[10px]">УДАЛИТЬ</button></div>
                    <p class="text-sm opacity-80">${l.fio}</p><p class="text-xs text-emerald-400">${l.contact}</p>
                </div>`;
            });
        }

        function renderInv() {
            const list = document.getElementById('list-inv');
            const q = document.getElementById('search').value.toLowerCase();
            list.innerHTML = "";
            Object.keys(allStock).reverse().forEach(k => {
                const i = allStock[k];
                if(i.num.includes(q)) {
                    list.innerHTML += `<div class="card flex justify-between items-center mb-2">
                        <span>+7 ${i.num} <small class="gold-text">${i.price}₽</small></span>
                        <button onclick="db.ref('inventory/${k}').remove()" class="text-red-900 text-[10px]">УДАЛИТЬ</button>
                    </div>`;
                }
            });
        }

        function renderChatList(chats) {
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            Object.keys(chats).forEach(id => {
                const last = chats[id].metadata?.lastMsg || "Нет сообщений";
                list.innerHTML += `<div onclick="openChat('${id}')" class="p-3 bg-white/5 rounded-xl border border-white/5 text-[10px] cursor-pointer mb-1">
                    <b>ID: ${id}</b><br><span class="opacity-50">${last}</span>
                </div>`;
            });
        }

        function openChat(id) {
            currentChatId = id;
            document.getElementById('chat-box').classList.remove('hidden');
            db.ref('chats/'+id+'/messages').off();
            db.ref('chats/'+id+'/messages').on('value', s => {
                const msgs = document.getElementById('chat-msgs');
                msgs.innerHTML = "";
                Object.values(s.val() || {}).forEach(m => {
                    const isA = m.role === 'admin';
                    msgs.innerHTML += `<div class="${isA ? 'ml-auto bg-[#bf953f] text-black' : 'mr-auto bg-white/10 text-white'} p-2 rounded-xl max-w-[85%] font-bold text-[11px] mb-1">${m.text}</div>`;
                });
                msgs.scrollTop = msgs.scrollHeight;
            });
        }

        function sendAdminMsg() {
            const i = document.getElementById('chat-in');
            if(!i.value.trim() || !currentChatId) return;
            db.ref('chats/'+currentChatId+'/messages').push({text: i.value, role: 'admin'});
            db.ref('chats/'+currentChatId+'/metadata/lastMsg').set("Админ: " + i.value);
            i.value = "";
        }

        function addNumbers() {
            const raw = document.getElementById('new-nums').value;
            const price = document.getElementById('new-price').value;
            const op = document.getElementById('new-op').value;
            if(!raw || !price) return;
            raw.split(/[ , \n]+/).forEach(n => { if(n.trim()) db.ref('inventory').push({num: n.trim(), price, op}); });
            document.getElementById('new-nums').value = "";
            showTab('inv');
        }
    </script>
</body>
</html>
