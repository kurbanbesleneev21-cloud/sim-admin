<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIM MARKET | CONTROL 7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background: #050505; color: #fff; margin: 0; padding-bottom: 90px; }
        .gold-text { background: linear-gradient(90deg, #bf953f, #fcf6ba, #bf953f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: #0d0d0d; border: 1px solid rgba(191,149,63,0.1); border-radius: 20px; padding: 18px; }
        .input-dark { background: #151515; border: 1px solid #222; border-radius: 12px; padding: 12px; width: 100%; color: #fff; outline: none; font-size: 14px; }
        .input-dark:focus { border-color: #bf953f; }
        .tab-btn { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #555; padding: 12px 5px; border-bottom: 2px solid transparent; flex: 1; text-align: center; }
        .tab-active { color: #bf953f; border-color: #bf953f; background: rgba(191,149,63,0.05); }
        .btn-gold { background: #bf953f; color: #000; font-weight: 800; border-radius: 14px; padding: 14px; width: 100%; transition: 0.3s; }
        .btn-gold:active { transform: scale(0.95); }
        .badge { font-size: 8px; padding: 3px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="auth" class="fixed inset-0 bg-[#050505] z-[200] flex items-center justify-center p-6">
        <div class="w-full max-w-xs text-center">
            <div class="mb-8">
                <h1 class="text-3xl font-black gold-text italic">SIM CONTROL</h1>
                <p class="text-[9px] opacity-30 tracking-[4px] uppercase mt-1 text-white">Elite Administration</p>
            </div>
            <input type="password" id="pass" placeholder="ПИН-КОД" class="input-dark text-center mb-4 text-2xl tracking-[10px]">
            <button onclick="login()" class="btn-gold uppercase shadow-lg shadow-amber-900/20">Доступ разрешен</button>
        </div>
    </div>

    <div id="app" class="hidden">
        
        <header class="p-6 flex justify-between items-center border-b border-white/5 bg-[#080808]">
            <div>
                <h2 class="text-sm font-black gold-text italic tracking-tighter">PREMIUM HUB v7.0</h2>
                <p id="stat-summary" class="text-[9px] opacity-40 uppercase font-bold tracking-widest mt-1">Загрузка данных...</p>
            </div>
            <button onclick="location.reload()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-xs">🔄</button>
        </header>

        <nav class="flex bg-[#080808] sticky top-0 z-50 border-b border-white/5">
            <button onclick="showTab('leads')" id="btn-leads" class="tab-btn tab-active">Заявки</button>
            <button onclick="showTab('inventory')" id="btn-inventory" class="tab-btn">Склад</button>
            <button onclick="showTab('add')" id="btn-add" class="tab-btn">Добавить</button>
            <button onclick="showTab('settings')" id="btn-settings" class="tab-btn">Настройки</button>
        </nav>

        <main class="p-5">
            
            <div id="tab-leads" class="space-y-4">
                <div id="leads-list" class="space-y-4">
                    <p class="text-center opacity-20 py-10">Ожидание заказов...</p>
                </div>
            </div>

            <div id="tab-inventory" class="hidden space-y-4">
                <input type="text" id="stock-search" oninput="renderStock()" placeholder="🔍 Поиск по цифрам..." class="input-dark mb-2">
                <div id="stock-list" class="space-y-3 pb-10"></div>
            </div>

            <div id="tab-add" class="hidden space-y-4">
                <div class="card bg-gradient-to-br from-[#111] to-[#0a0a0a]">
                    <h3 class="text-[10px] font-black mb-4 uppercase opacity-50 tracking-widest text-amber-500">Регистрация номера</h3>
                    <p class="text-[9px] opacity-30 mb-2 italic">Можно добавить один или несколько через запятую</p>
                    <input type="text" id="in-num" placeholder="999-000-11-22" class="input-dark mb-3">
                    <input type="number" id="in-price" placeholder="Цена за ед. (₽)" class="input-dark mb-3">
                    <select id="in-op" class="input-dark mb-4">
                        <option value="mts">МТС</option>
                        <option value="megafon">Мегафон</option>
                        <option value="beeline">Билайн</option>
                        <option value="tele2">Tele2</option>
                        <option value="yota">Yota</option>
                    </select>
                    <button onclick="addItem()" class="btn-gold uppercase text-[11px] tracking-widest">Опубликовать</button>
                </div>
            </div>

            <div id="tab-settings" class="hidden space-y-4">
                <div class="card">
                    <h3 class="text-[10px] font-black mb-4 uppercase opacity-50 tracking-widest">Интеграция Telegram</h3>
                    <input type="text" placeholder="Bot Token" class="input-dark mb-3 opacity-30">
                    <input type="text" placeholder="Your Chat ID" class="input-dark mb-4 opacity-30">
                    <button class="w-full p-3 rounded-xl border border-white/10 text-[10px] font-bold uppercase opacity-30">Сохранить настройки</button>
                </div>
                <div class="card border-red-900/20">
                    <h3 class="text-[10px] font-black mb-4 uppercase text-red-500">Опасная зона</h3>
                    <button onclick="clearAllData()" class="w-full p-4 rounded-xl bg-red-950/20 text-red-500 border border-red-900/30 text-[10px] font-black uppercase">Удалить все данные</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44",
            authDomain: "nnnmb-a0b52.firebaseapp.com",
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com",
            projectId: "nnnmb-a0b52"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allStock = {};
        let allLeads = {};

        function login() {
            if(document.getElementById('pass').value === "7777") {
                document.getElementById('auth').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                init();
            } else { alert("Неверный код доступа"); }
        }

        function showTab(t) {
            ['leads', 'inventory', 'add', 'settings'].forEach(x => {
                document.getElementById('tab-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('tab-active');
            });
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('tab-active');
        }

        function init() {
            db.ref('leads').on('value', s => {
                allLeads = s.val() || {};
                renderLeads();
                updateStats();
            });
            db.ref('inventory').on('value', s => {
                allStock = s.val() || {};
                renderStock();
                updateStats();
            });
        }

        function updateStats() {
            const stockCount = Object.keys(allStock).length;
            const leadsCount = Object.keys(allLeads).length;
            document.getElementById('stat-summary').innerText = `Склад: ${stockCount} | Заказы: ${leadsCount}`;
        }

        function renderLeads() {
            const list = document.getElementById('leads-list');
            const keys = Object.keys(allLeads).reverse();
            list.innerHTML = keys.length ? "" : '<p class="text-center opacity-20 py-20">Новых заявок пока нет</p>';
            keys.forEach(k => {
                const item = allLeads[k];
                list.innerHTML += `
                    <div class="card border-l-4 border-amber-500 bg-gradient-to-r from-amber-500/5 to-transparent">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="text-xl font-black tracking-tighter">+7 ${item.num}</h4>
                            <button onclick="deleteItem('leads/${k}')" class="text-[10px] text-white/20 uppercase">Удалить</button>
                        </div>
                        <div class="text-xs font-bold mb-4 opacity-60">${item.fio} <span class="mx-2">|</span> ${item.contact}</div>
                        <div class="flex gap-2">
                            <a href="tel:${item.contact}" class="flex-1 text-center bg-white/5 p-3 rounded-xl text-[10px] font-black uppercase">Позвонить</a>
                            <a href="https://wa.me/${item.contact.replace(/\D/g,'')}" class="flex-1 text-center bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 p-3 rounded-xl text-[10px] font-black uppercase">WhatsApp</a>
                        </div>
                    </div>`;
            });
        }

        function renderStock() {
            const list = document.getElementById('stock-list');
            const search = document.getElementById('stock-search').value.toLowerCase();
            const keys = Object.keys(allStock).reverse();
            list.innerHTML = "";
            
            keys.forEach(k => {
                const item = allStock[k];
                if(item.num.includes(search)) {
                    list.innerHTML += `
                        <div class="card flex justify-between items-center bg-[#080808]">
                            <div>
                                <p class="text-sm font-black italic">+7 ${item.num}</p>
                                <p class="text-[9px] font-bold opacity-30 uppercase tracking-widest">${item.op} • ${item.price} ₽</p>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="deleteItem('inventory/${k}')" class="text-[10px] text-red-500/50 font-black">Удалить</button>
                            </div>
                        </div>`;
                }
            });
        }

        function addItem() {
            const numInput = document.getElementById('in-num').value;
            const price = document.getElementById('in-price').value;
            const op = document.getElementById('in-op').value;
            
            if(!numInput || !price) return alert("Заполни данные!");

            // Поддержка массового добавления через запятую
            const nums = numInput.split(',').map(n => n.trim());
            
            nums.forEach(n => {
                if(n) db.ref('inventory').push({ num: n, price, op, status: 'sale' });
            });

            document.getElementById('in-num').value = "";
            alert("Готово! Номера на витрине.");
            showTab('inventory');
        }

        function deleteItem(path) { if(confirm("Удалить?")) db.ref(path).remove(); }
        
        function clearAllData() {
            if(confirm("ВНИМАНИЕ! Это удалит ВООБЩЕ ВСЁ. Ты уверен?")) {
                db.ref('/').remove();
                location.reload();
            }
        }
    </script>
</body>
</html>
