<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM MARKET | ADMIN ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background: #050505; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .gold-border { border-color: #bf953f; }
        .gold-text { color: #bf953f; }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        .btn-action { background: #bf953f; color: #000; font-weight: 800; transition: 0.3s; }
        .btn-action:hover { background: #fcf6ba; transform: translateY(-2px); }
        .nav-tab { padding: 12px 20px; cursor: pointer; opacity: 0.5; border-bottom: 2px solid transparent; }
        .nav-tab.active { opacity: 1; border-color: #bf953f; color: #bf953f; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic uppercase tracking-tighter">SIM <span class="gold-text">ADMIN</span></h1>
                <p class="text-[10px] opacity-40 uppercase tracking-[3px]">Система управления бизнесом</p>
            </div>
            <button onclick="location.reload()" class="p-3 glass rounded-xl text-xs uppercase font-bold">Обновить данные</button>
        </div>

        <div class="flex gap-6 border-bottom border-white/5 mb-10 overflow-x-auto no-scrollbar">
            <div class="nav-tab active" id="tab-nums" onclick="switchTab('nums')">Номера</div>
            <div class="nav-tab" id="tab-users" onclick="switchTab('users')">Клиенты</div>
            <div class="nav-tab" id="tab-orders" onclick="switchTab('orders')">Заказы</div>
            <div class="nav-tab" id="tab-design" onclick="switchTab('design')">Баннеры & Сайт</div>
        </div>

        <section id="sec-nums" class="space-y-6">
            <div class="grid md:grid-cols-4 gap-4 glass p-6 rounded-[30px]">
                <input type="text" id="new-num" placeholder="999 000 00 00" class="p-4 rounded-2xl">
                <input type="number" id="new-price" placeholder="Цена (руб)" class="p-4 rounded-2xl">
                <select id="new-op" class="p-4 rounded-2xl">
                    <option value="МТС">МТС</option>
                    <option value="БИЛАЙН">Билайн</option>
                    <option value="МЕГАФОН">Мегафон</option>
                </select>
                <button onclick="addNumber()" class="btn-action rounded-2xl">Добавить номер</button>
            </div>
            
            <div class="glass rounded-[30px] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] uppercase opacity-40">
                        <tr>
                            <th class="p-5">Номер</th>
                            <th class="p-5">Оператор</th>
                            <th class="p-5">Цена</th>
                            <th class="p-5 text-right">Действие</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-list"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-users" class="hidden">
            <div class="glass rounded-[30px] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] uppercase opacity-40">
                        <tr>
                            <th class="p-5">Телефон клиента</th>
                            <th class="p-5">Пароль</th>
                            <th class="p-5 text-right">Действие</th>
                        </tr>
                    </thead>
                    <tbody id="users-list">
                        <tr><td colspan="3" class="p-10 text-center opacity-20 italic">База клиентов хранится в LocalStorage (локально)</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section id="sec-orders" class="hidden">
            <div class="text-center py-20 glass rounded-[40px]">
                <p class="opacity-30 uppercase text-xs font-bold">Сюда будут падать заявки из Firebase</p>
                <p class="text-[10px] mt-2 text-yellow-500">Функция в разработке (нужна доп. ветка в БД)</p>
            </div>
        </section>

        <section id="sec-design" class="hidden space-y-6">
            <div class="glass p-8 rounded-[40px] max-w-2xl">
                <h3 class="text-xl font-bold mb-6 gold-text italic">Настройка главного баннера</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] uppercase opacity-40 block mb-2">Заголовок баннера</label>
                        <input type="text" id="banner-title" value="Hasavyurt Elite" class="w-full p-4 rounded-xl">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase opacity-40 block mb-2">Подзаголовок</label>
                        <input type="text" id="banner-sub" value="SIM MARKET — Твой статус в цифрах" class="w-full p-4 rounded-xl">
                    </div>
                    <button onclick="alert('Настройки сохранены!')" class="btn-action w-full py-4 rounded-xl">Применить на сайте</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        const fbApp = firebase.initializeApp({ 
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com" 
        });
        const rdb = fbApp.database();

        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active');
            
            if(tab === 'users') renderUsers();
        }

        // РАБОТА С НОМЕРАМИ
        function addNumber() {
            const num = document.getElementById('new-num').value;
            const price = document.getElementById('new-price').value;
            const op = document.getElementById('new-op').value;
            
            if(!num || !price) return alert("Заполни данные!");
            
            const id = Date.now();
            rdb.ref('inventory/' + id).set({
                num: num,
                price: price,
                op: op,
                id: id
            }).then(() => {
                alert("Номер добавлен!");
                document.getElementById('new-num').value = "";
                document.getElementById('new-price').value = "";
            });
        }

        function deleteNum(id) {
            if(confirm("Удалить номер?")) {
                rdb.ref('inventory/' + id).remove();
            }
        }

        // ЗАГРУЗКА ИНВЕНТАРЯ
        rdb.ref('inventory').on('value', snapshot => {
            const list = document.getElementById('inventory-list');
            list.innerHTML = "";
            const data = snapshot.val();
            for(let id in data) {
                const item = data[id];
                list.innerHTML += `
                    <tr class="border-t border-white/5 hover:bg-white/5 transition">
                        <td class="p-5 font-bold italic">+7 ${item.num}</td>
                        <td class="p-5"><span class="text-[10px] bg-white/10 px-3 py-1 rounded-full uppercase font-black">${item.op}</span></td>
                        <td class="p-5 gold-text font-black">${item.price} ₽</td>
                        <td class="p-5 text-right">
                            <button onclick="deleteNum('${id}')" class="text-red-500 text-xs font-bold uppercase">Удалить</button>
                        </td>
                    </tr>
                `;
            }
        });

        // ПРОСМОТР КЛИЕНТОВ (из LocalStorage, как в твоем коде)
        function renderUsers() {
            const list = document.getElementById('users-list');
            const users = JSON.parse(localStorage.getItem('user_db')) || {};
            list.innerHTML = "";
            
            for(let phone in users) {
                list.innerHTML += `
                    <tr class="border-t border-white/5">
                        <td class="p-5 font-bold">+7 ${phone}</td>
                        <td class="p-5 opacity-60">${users[phone].pass}</td>
                        <td class="p-5 text-right"><button class="opacity-20 text-xs">BAN</button></td>
                    </tr>
                `;
            }
        }
    </script>
</body>
</html>
