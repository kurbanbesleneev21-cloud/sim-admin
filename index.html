<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIM ADMIN</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
}

.gold{
color:#bf953f
}

.glass{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.05)
}

.tab{
padding:12px 20px;
cursor:pointer;
opacity:.4
}

.tab.active{
opacity:1;
color:#bf953f
}

</style>

</head>

<body class="p-6">

<div class="max-w-7xl mx-auto">

<h1 class="text-2xl font-bold mb-8">
SIM <span class="gold">ADMIN</span>
</h1>

<!-- LOGIN -->

<div id="login">

<div class="glass p-6 rounded-xl max-w-md">

<h2 class="mb-4 font-bold">Вход администратора</h2>

<input id="adminPass" placeholder="Пароль" class="p-3 w-full mb-4 text-black">

<button onclick="login()" class="bg-[#bf953f] px-4 py-2 rounded text-black">
Войти
</button>

</div>

</div>

<!-- PANEL -->

<div id="panel" style="display:none">

<!-- SEARCH -->

<input id="search" placeholder="Поиск..." class="p-3 text-black w-full mb-6">

<!-- TABS -->

<div class="flex gap-6 mb-6">

<div class="tab active" onclick="tab('dashboard')" id="t-dashboard">Dashboard</div>
<div class="tab" onclick="tab('nums')" id="t-nums">Номера</div>
<div class="tab" onclick="tab('orders')" id="t-orders">Заявки</div>
<div class="tab" onclick="tab('users')" id="t-users">Клиенты</div>
<div class="tab" onclick="tab('tickets')" id="t-tickets">Тикеты</div>
<div class="tab" onclick="tab('files')" id="t-files">Файлы</div>
<div class="tab" onclick="tab('logs')" id="t-logs">Логи</div>
<div class="tab" onclick="tab('settings')" id="t-settings">Настройки</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="grid grid-cols-4 gap-6">

<div class="glass p-6">
<h3 class="opacity-50">Номеров</h3>
<p id="statNums" class="text-2xl gold">0</p>
</div>

<div class="glass p-6">
<h3 class="opacity-50">Клиентов</h3>
<p id="statUsers" class="text-2xl gold">0</p>
</div>

<div class="glass p-6">
<h3 class="opacity-50">Заявок</h3>
<p id="statOrders" class="text-2xl gold">0</p>
</div>

<div class="glass p-6">
<h3 class="opacity-50">Тикетов</h3>
<p id="statTickets" class="text-2xl gold">0</p>
</div>

</div>

</div>

<!-- USERS -->

<div id="users" style="display:none">

<table class="w-full">

<thead>

<tr>

<th>Телефон</th>
<th>Пароль</th>
<th>Роль</th>
<th>Бан</th>

</tr>

</thead>

<tbody id="listUsers"></tbody>

</table>

</div>

<!-- TICKETS -->

<div id="tickets" style="display:none">

<table class="w-full">

<thead>

<tr>

<th>Пользователь</th>
<th>Проблема</th>
<th>Ответ</th>

</tr>

</thead>

<tbody id="listTickets"></tbody>

</table>

</div>

<!-- FILE MANAGER -->

<div id="files" style="display:none">

<input type="file" id="fileUpload">

<button onclick="uploadFile()" class="bg-[#bf953f] px-4 py-2 text-black">
Загрузить
</button>

<ul id="fileList"></ul>

</div>

<!-- LOGS -->

<div id="logs" style="display:none">

<ul id="logsList"></ul>

</div>

<!-- SETTINGS -->

<div id="settings" style="display:none">

<input id="siteName" placeholder="Название сайта" class="p-3 text-black mb-3">

<input id="siteEmail" placeholder="Email" class="p-3 text-black mb-3">

<button onclick="saveSettings()" class="bg-[#bf953f] px-4 py-2 text-black">
Сохранить
</button>

</div>

</div>

</div>

<script>

const conf={
apiKey:"AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44",
databaseURL:"https://nnnmb-a0b52-default-rtdb.firebaseio.com"
}

firebase.initializeApp(conf)

const db=firebase.database()

function login(){

const pass=document.getElementById("adminPass").value

if(pass==="admin123"){

document.getElementById("login").style.display="none"

document.getElementById("panel").style.display="block"

}

else alert("Неверный пароль")

}

function tab(name){

document.querySelectorAll("#panel > div").forEach(e=>e.style.display="none")

document.getElementById(name).style.display="block"

}

function log(action){

const id=Date.now()

db.ref("logs/"+id).set({

action,
date:new Date().toLocaleString()

})

}

db.ref("users").on("value",snap=>{

const data=snap.val()

const container=document.getElementById("listUsers")

container.innerHTML=""

for(let p in data){

container.innerHTML+=`

<tr>

<td>+7 ${p}</td>

<td>${data[p].pass}</td>

<td>${data[p].role||"user"}</td>

<td>

<button onclick="banUser('${p}')">Бан</button>

</td>

</tr>

`

}

document.getElementById("statUsers").innerText=Object.keys(data).length

})

function banUser(id){

db.ref("users/"+id+"/banned").set(true)

log("user banned")

}

function saveSettings(){

const name=document.getElementById("siteName").value

const email=document.getElementById("siteEmail").value

db.ref("settings").set({name,email})

alert("Сохранено")

}

</script>

</body>
</html>
