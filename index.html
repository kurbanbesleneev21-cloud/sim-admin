<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin — SimMarket Электроника</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --bg: #0A0E27; --accent: #3B82F6; --card: rgba(30, 41, 59, 0.7); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .card { background: var(--card); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        h2, h3 { margin-top: 0; color: #fff; }
        
        label { display: block; font-size: 12px; color: #94A3B8; margin: 10px 0 5px; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        
        .spec-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn { border: none; border-radius: 12px; padding: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-add { background: linear-gradient(135deg, #3B82F6, #2563EB); color: white; }
        .btn-spec { background: rgba(59, 130, 246, 0.1); color: #3B82F6; padding: 8px; font-size: 12px; }
        
        .item-preview { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .item-preview img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .del-btn { background: none; border: none; color: #EF4444; font-size: 18px; padding-left: 10px; }
    </style>
</head>
<body>

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <h2>Админка ⚙️</h2>
    <button onclick="location.reload()" style="background:none; border:none; color:var(--accent);"><i class="fas fa-sync"></i></button>
</div>

<div class="card">
    <h3>Добавить товар</h3>
    
    <label>Название товара</label>
    <input type="text" id="name" placeholder="Напр: MacBook Air M2">

    <div style="display: flex; gap: 10px;">
        <div style="flex:1">
            <label>Цена (₽)</label>
            <input type="number" id="price" placeholder="120000">
        </div>
        <div style="flex:1">
            <label>Старая цена (для скидки)</label>
            <input type="number" id="oldPrice" placeholder="145000">
        </div>
    </div>

    <label>Категория</label>
    <select id="category">
        <option>Смартфоны</option>
        <option>Ноутбуки</option>
        <option>Часы</option>
        <option>Наушники</option>
    </select>

    <label>Бренд</label>
    <input type="text" id="brand" placeholder="Apple">

    <label>Ссылка на фото (URL)</label>
    <input type="text" id="image" placeholder="https://ссылка-на-картинку.jpg">

    <label>Характеристики</label>
    <div id="specsContainer">
        <div class="spec-row">
            <input type="text" placeholder="Свойство (Память)" class="spec-key">
            <input type="text" placeholder="Значение (256 ГБ)" class="spec-val">
        </div>
    </div>
    <button class="btn btn-spec" onclick="addSpecRow()">+ Добавить еще характеристику</button>

    <button class="btn btn-add" onclick="saveProduct()">Опубликовать на сайт</button>
</div>

<h3 style="padding-left: 5px;">Товары на сайте (<span id="count">0</span>)</h3>
<div id="list"></div>

<script>
    let products = JSON.parse(localStorage.getItem('sim_products')) || [];

    function addSpecRow() {
        const div = document.createElement('div');
        div.className = 'spec-row';
        div.innerHTML = `<input type="text" placeholder="Свойство" class="spec-key"><input type="text" placeholder="Значение" class="spec-val">`;
        document.getElementById('specsContainer').appendChild(div);
    }

    function saveProduct() {
        const name = document.getElementById('name').value;
        const price = parseInt(document.getElementById('price').value);
        const oldPrice = parseInt(document.getElementById('oldPrice').value);
        const category = document.getElementById('category').value;
        const brand = document.getElementById('brand').value;
        const image = document.getElementById('image').value || 'https://placehold.co/300x300?text=Electronics';

        if (!name || !price) return alert('Заполни название и цену!');

        // Собираем характеристики в массив объектов
        const specs = [];
        document.querySelectorAll('.spec-row').forEach(row => {
            const k = row.querySelector('.spec-key').value;
            const v = row.querySelector('.spec-val').value;
            if (k && v) specs.push({ key: k, value: v });
        });

        const newProduct = {
            id: Date.now(),
            name,
            price,
            oldPrice: oldPrice || null,
            category,
            brand,
            image,
            specs
        };

        products.push(newProduct);
        localStorage.setItem('sim_products', JSON.stringify(products));
        alert('Товар выставлен!');
        location.reload(); 
    }

    function deleteItem(id) {
        if (confirm('Удалить товар?')) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('sim_products', JSON.stringify(products));
            render();
        }
    }

    function render() {
        document.getElementById('count').innerText = products.length;
        document.getElementById('list').innerHTML = products.map(p => `
            <div class="item-preview">
                <img src="${p.image}">
                <div style="flex:1">
                    <div style="font-size:14px; font-weight:600;">${p.name}</div>
                    <div style="font-size:12px; color:var(--accent);">${p.price.toLocaleString()} ₽</div>
                </div>
                <button class="del-btn" onclick="deleteItem(${p.id})"><i class="fas fa-trash"></i></button>
            </div>
        `).reverse().join('');
    }

    render();
</script>

</body>
</html>
