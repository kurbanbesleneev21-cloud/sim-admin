<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIM ADMIN v8.5 | CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background: #050505; color: #fff; margin: 0; padding-bottom: 80px; }
        .gold-text { background: linear-gradient(90deg, #bf953f, #fcf6ba, #bf953f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: #0d0d0d; border: 1px solid rgba(191,149,63,0.1); border-radius: 20px; padding: 15px; }
        .input-dark { background: #151515; border: 1px solid #222; border-radius: 12px; padding: 12px; width: 100%; color: #fff; outline: none; font-size: 13px; }
        .tab-btn { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #444; flex: 1; text-align: center; padding: 15px 0; border-bottom: 2px solid transparent; }
        .tab-active { color: #bf953f; border-color: #bf953f; background: rgba(191,149,63,0.05); }
        .btn-gold { background: #bf953f; color: #000; font-weight: 800; border-radius: 12px; padding: 12px; width: 100%; text-transform: uppercase; }
        
        /* Стили чата в админке */
        .chat-item { border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .chat-active { border-color: #bf953f; background: rgba(191,149,63,0.1); }
        .msg-admin { align-self: flex-end; background: #bf953f; color: #000; }
        .msg-user { align-self: flex-start; background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body>

    <div id="auth" class="fixed inset-0 bg-black z-[200] flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-xs">
            <h1 class="text-3xl font-black gold-text italic mb-6">SIM CONTROL</h1>
            <input type="password" id="pass" placeholder="ПИН-КОД" class="input-dark text-center mb-4 text-xl tracking-[10px]">
            <button onclick="login()" class="btn-gold">ВОЙТИ В ПАНЕЛЬ</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="p-6 bg-[#080808] border-b border-white/5 flex justify-between items-center">
            <div>
                <p class="text-[8px] opacity-30 uppercase tracking-widest mb-1">Market Stats</p>
                <div class="flex gap-4">
                    <div class="text-emerald-500 font-black text-lg" id="stat-v">0 <span class="text-[9px] opacity-50 uppercase">Визиты</span></div>
                    <div class="text-white font-black text-lg" id="stat-s">0 <span class="text-[9px] opacity-50 uppercase">Склад</span></div>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-white/5 p-2 rounded-lg text-sm">🔄</button>
        </header>

        <nav class="flex sticky top-0 bg-black/95 backdrop-blur-lg z-50 border-b border-white/5">
            <button onclick="showTab('inv')" id="btn-inv" class="tab-btn tab-active">Склад</button>
            <button onclick="showTab('add')" id="btn-add" class="tab-btn">Добавить</button>
            <button onclick="showTab('chat')" id="btn-chat" class="tab-btn">Чат</button>
            <button onclick="showTab('set')" id="btn-set" class="tab-btn">Сайт</button>
        </nav>

        <main class="p-4 space-y-4">
            <div id="tab-inv" class="space-y-3">
                <input type="text" id="search" oninput="renderInv()" placeholder="Поиск номера..." class="input-dark">
                <div id="list-inv" class="space-y-2 pb-10"></div>
            </div>

            <div id="tab-add" class="hidden card">
                <h3 class="text-[10px] font-black uppercase opacity-40 mb-4">Массовый ввод номеров</h3>
                <textarea id="new-nums" placeholder="Введите номера (можно через запятую, пробел или с новой строки)..." class="input-dark h-32 mb-3 text-xs"></textarea>
                <input type="number" id="new-price" placeholder="Цена для всех (₽)" class="input-dark mb-3">
                <select id="new-op" class="input-dark mb-4">
                    <option value="mts">МТС</option>
                    <option value="megafon">Мегафон</option>
                    <option value="beeline">Билайн</option>
                    <option value="tele2">Tele2</option>
                    <option value="yota">Yota</option>
                </select>
                <button onclick="addNumbers()" class="btn-gold">Выставить на витрину</button>
            </div>

            <div id="tab-chat" class="hidden flex flex-col gap-4">
                <div id="chat-list" class="space-y-2 max-h-[150px] overflow-y-auto">
                    <p class="text-center opacity-20 py-4 text-[10px]">Загрузка диалогов...</p>
                </div>
                <div id="chat-box" class="card h-[400px] flex flex-col hidden border-[#bf953f]/30">
                    <div id="chat-target" class="text-[10px] gold-text font-black mb-3 uppercase tracking-widest">Выберите диалог</div>
                    <div id="chat-msgs" class="flex-1 overflow-y-auto space-y-3 flex flex-col pr-2 mb-3"></div>
                    <div class="flex gap-2 border-t border-white/5 pt-3">
                        <input type="text" id="chat-in" placeholder="Ваш ответ..." class="input-dark flex-1">
                        <button onclick="sendAdminMsg()" class="bg-[#bf953f] text-black px-5 rounded-xl font-black text-lg">></button>
                    </div>
                </div>
            </div>

            <div id="tab-set" class="hidden card text-center">
                <h3 class="text-[10px] font-black uppercase opacity-40 mb-4">Объявление на сайте (Banner)</h3>
                <input type="text" id="site-banner" placeholder="Например: Скидка 20% всем!" class="input-dark mb-4 text-center">
                <button onclick="saveBanner()" class="btn-gold">Опубликовать баннер</button>
                <button onclick="db.ref('settings/banner').remove()" class="mt-4 text-[9px] opacity-20 uppercase font-bold">Удалить баннер</button>
            </div>
        </main>
    </div>

    <script>
        const cfg = { 
            apiKey: "AIzaSyCRjRJkH4dPxvyYD-37emejFvK11g6hZ44", 
            authDomain: "nnnmb-a0b52.firebaseapp.com", 
            databaseURL: "https://nnnmb-a0b52-default-rtdb.firebaseio.com", 
            projectId: "nnnmb-a0b52" 
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();

        let currentChatId = '';
        let allStock = {};

        function login() {
            if(document.getElementById('pass').value === '7777') {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                init();
            } else { alert('Неверный код'); }
        }

        function showTab(t) {
            ['inv','add','chat','set'].forEach(x => {
                document.getElementById('tab-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('tab-active');
            });
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('tab-active');
        }

        function init() {
            // Склад
            db.ref('inventory').on('value', s => {
                allStock = s.val() || {};
                renderInv();
                document.getElementById('stat-s').innerText = Object.keys(allStock).length;
            });
            // Визиты
            db.ref('stats/visits').on('value', s => {
                document.getElementById('stat-v').innerText = s.val() || 0;
            });
            // Баннер
            db.ref('settings/banner').on('value', s => {
                document.getElementById('site-banner').value = s.val() || "";
            });
            // Чаты
            db.ref('chats').on('value', s => {
                renderChatList(s.val() || {});
            });
        }

        function renderInv() {
            const list = document.getElementById('list-inv');
            const query = document.getElementById('search').value.toLowerCase();
            list.innerHTML = "";
            Object.keys(allStock).reverse().forEach(k => {
                const item = allStock[k];
                if(item.num.includes(query)) {
                    list.innerHTML += `
                        <div class="card flex justify-between items-center py-3">
                            <div>
                                <p class="font-black text-sm italic">+7 ${item.num}</p>
                                <p class="text-[9px] opacity-30 uppercase">${item.op} • ${parseInt(item.price).toLocaleString()}₽</p>
                            </div>
                            <button onclick="db.ref('inventory/${k}').remove()" class="text-red-900 text-[9px] font-black uppercase">Удалить</button>
                        </div>`;
                }
            });
        }

        function addNumbers() {
            const raw = document.getElementById('new-nums').value;
            const price = document.getElementById('new-price').value;
            const op = document.getElementById('new-op').value;
            if(!raw || !price) return alert("Заполни данные");

            const nums = raw.split(/[ , \n]+/).filter(n => n.trim().length > 5);
            nums.forEach(n => {
                db.ref('inventory').push({ num: n.trim(), price: price, op: op });
            });
            document.getElementById('new-nums').value = "";
            alert("Добавлено номеров: " + nums.length);
            showTab('inv');
        }

        function renderChatList(chats) {
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            const ids = Object.keys(chats).sort((a,b) => chats[b].metadata.ts - chats[a].metadata.ts);
            
            if(ids.length === 0) list.innerHTML = '<p class="text-center opacity-20 py-4 text-[10px]">НЕТ СООБЩЕНИЙ</p>';

            ids.forEach(id => {
                const meta = chats[id].metadata;
                list.innerHTML += `
                    <div onclick="openChat('${id}')" class="chat-item p-3 rounded-xl cursor-pointer ${currentChatId === id ? 'chat-active' : ''}">
                        <p class="text-[10px] font-bold gold-text uppercase">${id}</p>
                        <p class="text-xs opacity-40 truncate">${meta.lastMsg}</p>
                    </div>`;
            });
        }

        function openChat(id) {
            currentChatId = id;
            document.getElementById('chat-box').classList.remove('hidden');
            document.getElementById('chat-target').innerText = "КЛИЕНТ: " + id;
            
            db.ref('chats/' + id + '/messages').on('value', s => {
                if(currentChatId !== id) return;
                const msgs = document.getElementById('chat-msgs');
                msgs.innerHTML = "";
                Object.values(s.val() || {}).forEach(m => {
                    const isAdmin = m.role === 'admin';
                    msgs.innerHTML += `
                        <div class="px-3 py-2 rounded-2xl max-w-[85%] text-xs font-bold ${isAdmin ? 'msg-admin' : 'msg-user'}">
                            ${m.text}
                        </div>`;
                });
                msgs.scrollTop = msgs.scrollHeight;
            });
        }

        function sendAdminMsg() {
            const input = document.getElementById('chat-in');
            if(!input.value.trim() || !currentChatId) return;
            
            db.ref('chats/' + currentChatId + '/messages').push({
                text: input.value,
                role: 'admin',
                ts: Date.now()
            });
            db.ref('chats/' + currentChatId + '/metadata/lastMsg').set("Вы: " + input.value);
            input.value = "";
        }

        function saveBanner() {
            const txt = document.getElementById('site-banner').value;
            db.ref('settings/banner').set(txt).then(() => alert("Баннер обновлен!"));
        }
    </script>
</body>
</html>
